server {
  listen 80;
  server_name _;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
  gzip_min_length 1024;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers. Applied to every response that nginx handles itself
  # and forwarded upstream so the API server can layer its own (HSTS is
  # best served by the TLS terminator in front, not by us here on :80).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  # CSP is intentionally tight: only same-origin scripts/styles, no inline.
  # If you add Google Analytics or a CDN, append the host to the relevant directive.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  # Cache hashed assets aggressively; never cache index.html so deploys roll out immediately.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Public assets
  location ~* \.(?:ico|png|jpg|jpeg|svg|webp|gif|woff2?|ttf|otf)$ {
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # Proxy API calls to the FastAPI backend
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # Health probe for orchestrators
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # SPA fallback: every unknown path serves index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
