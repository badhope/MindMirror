server {
  listen 80;
  server_name _;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
  gzip_min_length 1024;

  root /usr/share/nginx/html;
  index index.html;

  # Cache hashed assets aggressively; never cache index.html so deploys roll out immediately.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Public assets
  location ~* \.(?:ico|png|jpg|jpeg|svg|webp|gif|woff2?|ttf|otf)$ {
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # Proxy API calls to the FastAPI backend
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # Health probe for orchestrators
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # SPA fallback: every unknown path serves index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
