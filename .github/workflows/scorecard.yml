name: OSSF Scorecard

on:
  # Scheduled weekly + on push to main for up-to-date score
  schedule:
    - cron: "17 6 * * 1"
  push:
    branches: [main, master]
  workflow_dispatch:

# Scorecard only needs read access; result upload needs id-token: write.
permissions:
  contents: read
  id-token: write
  actions: read
  security-events: write

jobs:
  analysis:
    name: Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@62b8690c4ac1bd3bfcd44d70de4d3a5952f016a3 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload to code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.27.5
        with:
          sarif_file: results.sarif
          category: scorecard
