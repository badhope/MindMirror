name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for the official `actions/deploy-pages` runner.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel a previous in-flight deployment when a new push lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint
      # Pages is served from a subpath, so the Vite build needs to know
      # the base path. Bump VITE_BASE_PATH if the repo is renamed.
      - run: npm run build:pages
        env:
          VITE_BASE_PATH: /MindMirror/
      - name: Add .nojekyll (skip Jekyll processing on Pages)
        run: touch dist/.nojekyll
      - name: Verify build output
        run: |
          set -e
          ls -la dist/
          test -f dist/404.html
          test -f dist/.nojekyll
          test -f dist/index.html
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
