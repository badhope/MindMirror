name: Build & Deploy to GitHub Pages (official workflow runner)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for the official `actions/deploy-pages` runner.
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent two deployments racing each other; the second one will
# cancel the first (saves runner minutes).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build (base=/MindMirror/)
        run: npm run build:pages
        env:
          VITE_BASE_PATH: /MindMirror/

      - name: Add .nojekyll (skip Jekyll processing on Pages)
        run: touch dist/.nojekyll

      - name: Verify build output
        run: |
          set -e
          echo "--- dist/ contents ---"
          ls -la dist/
          echo "--- dist/assets/ contents ---"
          ls -la dist/assets/ | head -20
          echo "--- File counts ---"
          echo "Total files in dist:        $(find dist -type f | wc -l)"
          echo "Has 404.html:               $(test -f dist/404.html && echo YES || echo NO)"
          echo "Has .nojekyll:              $(test -f dist/.nojekyll && echo YES || echo NO)"
          echo "Has index.html:             $(test -f dist/index.html && echo YES || echo NO)"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
