name: Build & Deploy to GitHub Pages (gh-pages branch)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout (full history so we can push back)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build (base=/MindMirror/)
        run: npm run build:pages
        env:
          VITE_BASE_PATH: /MindMirror/

      - name: Add .nojekyll (skip Jekyll processing)
        run: touch dist/.nojekyll

      - name: Verify build output
        run: |
          set -e
          echo "--- dist/ contents ---"
          ls -la dist/
          echo "--- dist/assets/ contents ---"
          ls -la dist/assets/
          echo "--- File counts ---"
          echo "Total files in dist:        $(find dist -type f | wc -l)"
          echo "Lazy chunks (Page-*.js):    $(find dist/assets -type f -name '*-*.js' | grep -v 'index-' | grep -v 'vendor-' | wc -l)"
          echo "Vendor chunks:              $(find dist/assets -type f -name 'vendor-*.js' | wc -l)"
          echo "Has 404.html:               $(test -f dist/404.html && echo YES || echo NO)"
          echo "Has .nojekyll:              $(test -f dist/.nojekyll && echo YES || echo NO)"
          echo "Has index.html:             $(test -f dist/index.html && echo YES || echo NO)"

      - name: Deploy dist/ -> gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          keep_files: false
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: GitHub Pages build ${{ github.run_number }} (commit ${{ github.sha }})"
          full_commit_message: "Deploy from GitHub Actions\n\nTriggered by ${{ github.event_name }}\nCommit: ${{ github.sha }}\nRun: ${{ github.run_id }}"
