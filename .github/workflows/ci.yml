name: CI - Type-check, Lint & Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
        env:
          VITE_BASE_PATH: /
      # 前端单元测试 (涵盖 7 个量表 × 887 个断言)
      - run: for f in tests/unit/*.mjs; do echo "=== $(basename $f) ==="; node --import tsx "$f" || exit 1; done

  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -q -r requirements.txt
          pip install -q httpx email-validator
      # 后端 pytest (84 个测试,涵盖 7 个 seed 量表)
      - run: python -m pytest -v
