name: CI - Type-check, Format & Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npx prettier --check "src/**/*.{ts,tsx,css,md}" "*.{json,js,mjs,md}" "tests/**/*.mjs"
      - run: npm run build
        env:
          VITE_BASE_PATH: /
      - run: npm test
