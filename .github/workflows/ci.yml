name: CI - Type-check, Lint & Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint
      - run: npx prettier --check "src/**/*.{ts,tsx,css}" "*.{json,js,mjs,md}" "tests/**/*.mjs"
      - run: npm run build
        env:
          VITE_BASE_PATH: /
      - run: for f in tests/unit/*.mjs; do echo "=== $(basename $f) ==="; node --import tsx "$f" || exit 1; done
