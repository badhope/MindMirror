version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      build:
        patterns:
          - 'vite'
          - '@vitejs/plugin-react'
          - 'typescript'
          - 'tsx'
      test:
        patterns:
          - 'playwright'
          - '@types/node'
          - 'prettier'
    labels:
      - 'dependencies'
      - 'npm'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    target-branch: 'main'
    versioning-strategy: increase
    ignore:
      - dependency-name: 'react'
        versions: ['19.x']
      - dependency-name: 'react-dom'
        versions: ['19.x']
