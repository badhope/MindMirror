# Dependabot configuration — keep dependencies up to date automatically.
# https://docs.github.com/en/code-security/dependabot

version: 2

updates:
  # Frontend — npm packages
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "badhope"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(frontend)"
    groups:
      react-stack:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
      build-tools:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
      linting:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
          - "prettier"
    ignore:
      # Major version bumps need manual review.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Backend — pip packages
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "badhope"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "deps(backend)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Docker — base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(ci)"
