<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-60" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="60" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-60" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="67" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-60" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="63" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-60">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-60" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="71" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#e2e2ec"/>
  <rect x="0" y="0" width="480" height="640" fill="#e2e2ec" filter="url(#paper-60)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-60" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#e2e2ec" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0a0a20" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-60)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#0a0a20" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#0a0a20" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#3a3a5a" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#0a0a20" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#3a3a5a" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#6a2030" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#6a2030" letter-spacing="2" font-weight="600">近代</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#6a2030"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#e2e2ec" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#0a0a20" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">少言多思</tspan><tspan x="0" dy="22">十九岁之解</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#3a3a5a" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#3a3a5a" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g stroke="#3a3a5a" stroke-width="1.2" fill="none">
    <rect x="72" y="260" width="16" height="190" fill="#3a3a5a" opacity="0.4"/>
    <line x1="70" y1="264" x2="90" y2="264" stroke-width="2"/>
    <line x1="69" y1="256" x2="91" y2="256" stroke-width="2.2"/>
    <line x1="72" y1="452" x2="88" y2="452"/>
    <line x1="70" y1="456" x2="90" y2="456"/>
  </g>
        
  <g stroke="#3a3a5a" stroke-width="1.2" fill="none">
    <rect x="392" y="260" width="16" height="190" fill="#3a3a5a" opacity="0.4"/>
    <line x1="390" y1="264" x2="410" y2="264" stroke-width="2"/>
    <line x1="389" y1="256" x2="411" y2="256" stroke-width="2.2"/>
    <line x1="392" y1="452" x2="408" y2="452"/>
    <line x1="390" y1="456" x2="410" y2="456"/>
  </g>
        
  <g>
    <path d="M 320 420 Q 360 414 400 420 L 400 450 Q 360 444 320 450 Z" fill="#e2e2ec" stroke="#0a0a20" stroke-width="1.2"/>
    <line x1="360" y1="420" x2="360" y2="446" stroke="#0a0a20" stroke-width="0.8"/>
    <line x1="326" y1="426" x2="352" y2="426" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/><line x1="326" y1="432" x2="352" y2="432" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/><line x1="326" y1="438" x2="352" y2="438" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/><line x1="326" y1="444" x2="352" y2="444" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/>
    <line x1="368" y1="426" x2="394" y2="426" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/><line x1="368" y1="432" x2="394" y2="432" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/><line x1="368" y1="438" x2="394" y2="438" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/><line x1="368" y1="444" x2="394" y2="444" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/>
  </g>
        <!-- 钟表 -->
        <g transform="translate(140 360)">
          <circle cx="0" cy="0" r="22" fill="#e2e2ec" stroke="#0a0a20" stroke-width="1.4"/>
          <line x1="0" y1="0" x2="0" y2="-14" stroke="#0a0a20" stroke-width="1.4"/>
          <line x1="0" y1="0" x2="12" y2="0" stroke="#0a0a20" stroke-width="1.4"/>
          <circle cx="0" cy="0" r="2" fill="#6a2030"/>
        </g>
        <!-- 正十七边形 -->
        <g transform="translate(240 280)" fill="none" stroke="#6a2030" stroke-width="1.4">
          <line x1="36" y1="0" x2="33.56900025855681" y2="13.004699982737506"/><line x1="33.56900025855681" y1="13.004699982737506" x2="26.604321019943725" y2="24.253043171276058"/><line x1="26.604321019943725" y1="24.253043171276058" x2="16.04658080795538" y2="32.22587848878224"/><line x1="16.04658080795538" y1="32.22587848878224" x2="3.3216609406788726" y2="35.84643034662124"/><line x1="3.3216609406788726" y1="35.84643034662124" x2="-9.851867642594984" y2="34.62572315422148"/><line x1="-9.851867642594984" y1="34.62572315422148" x2="-21.694846909653226" y2="28.728620182088626"/><line x1="-21.694846909653226" y1="28.728620182088626" x2="-30.607816886266104" y2="18.951557863584817"/><line x1="-30.607816886266104" y1="18.951557863584817" x2="-35.38703158862047" y2="6.614982641396534"/><line x1="-35.38703158862047" y1="6.614982641396534" x2="-35.38703158862047" y2="-6.614982641396525"/><line x1="-35.38703158862047" y1="-6.614982641396525" x2="-30.607816886266107" y2="-18.95155786358481"/><line x1="-30.607816886266107" y1="-18.95155786358481" x2="-21.694846909653236" y2="-28.728620182088623"/><line x1="-21.694846909653236" y1="-28.728620182088623" x2="-9.851867642594993" y2="-34.62572315422148"/><line x1="-9.851867642594993" y1="-34.62572315422148" x2="3.3216609406788558" y2="-35.84643034662125"/><line x1="3.3216609406788558" y1="-35.84643034662125" x2="16.04658080795536" y2="-32.22587848878225"/><line x1="16.04658080795536" y1="-32.22587848878225" x2="26.60432101994371" y2="-24.25304317127608"/><line x1="26.60432101994371" y1="-24.25304317127608" x2="33.56900025855681" y2="-13.00469998273751"/><line x1="33.56900025855681" y1="-13.00469998273751" x2="36" y2="-8.817456953860943e-15"/>
          <circle cx="0" cy="0" r="36"/>
          <circle cx="0" cy="0" r="3" fill="#6a2030"/>
        </g>
        <!-- 站者 -->
        <g transform="translate(240 360)" fill="#0a0a20" opacity="0.95">
          <ellipse cx="0" cy="0" rx="12" ry="15"/>
          <path d="M -18 12 L -24 50 L 24 50 L 18 12 Z"/>
          <ellipse cx="0" cy="-18" rx="10" ry="12" fill="#3a3a5a"/>
        </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#3a3a5a" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#3a3a5a" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#0a0a20" letter-spacing="14" font-weight="700">高斯</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#3a3a5a" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#6a2030" filter="url(#ink-27)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#e2e2ec" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="28" text-anchor="middle" font-family="serif" font-size="20" fill="#e2e2ec" font-weight="900">正</text>
      <text x="32" y="54" text-anchor="middle" font-family="serif" font-size="20" fill="#e2e2ec" font-weight="900">边</text>
      <g transform="rotate(-2 32 32)" opacity="0.95">
        <text x="14" y="22" text-anchor="middle" font-family="serif" font-size="16" fill="#e2e2ec" font-weight="900">十</text>
        <text x="50" y="50" text-anchor="middle" font-family="serif" font-size="16" fill="#e2e2ec" font-weight="900">七</text>
      </g>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#3a3a5a" letter-spacing="2" opacity="0.7">正十七边 · 镜心选镜</text>
</g>
</svg>