<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-78" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="78" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-78" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="85" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-78" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="81" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-78">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-78" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="89" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#dee8e0"/>
  <rect x="0" y="0" width="480" height="640" fill="#dee8e0" filter="url(#paper-78)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-78" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#dee8e0" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0e1a18" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-78)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#0e1a18" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#0e1a18" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#3e5a4a" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#0e1a18" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#3e5a4a" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#7a2a2a" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#7a2a2a" letter-spacing="2" font-weight="600">启蒙</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#7a2a2a"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#dee8e0" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#0e1a18" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">三大定律</tspan><tspan x="0" dy="22">宇宙之和</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#3e5a4a" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#3e5a4a" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 320 L 60 284 L 130 269 L 200 290 L 280 260 L 360 278 L 440 296 L 480 308 L 480 480 L 0 480 Z" fill="#5a7a6a" opacity="0.35"/>
    <path d="M 0 344 L 80 326 L 170 311 L 260 332 L 340 308 L 420 329 L 480 341 L 480 480 L 0 480 Z" fill="#5a7a6a" opacity="0.55"/>
  </g>
        
  <g>
    <circle cx="380" cy="110" r="22" fill="#dee8e0" opacity="0.18"/>
    <circle cx="380" cy="110" r="18" fill="#dee8e0" opacity="0.9"/>
  </g>
        
  <g fill="#dee8e0" opacity="0.85">
    <ellipse cx="120" cy="150" rx="35" ry="6"/>
    <ellipse cx="106" cy="146" rx="12.6" ry="5"/>
    <ellipse cx="132.6" cy="147" rx="14" ry="4"/>
  </g>
        <!-- 椭圆轨道 -->
        <g transform="translate(240 320)" stroke="#0e1a18" stroke-width="1.2" fill="none">
          <ellipse cx="0" cy="0" rx="60" ry="30" fill="#5a7a6a" opacity="0.4"/>
          <circle cx="20" cy="0" r="4" fill="#7a2a2a"/>
          <circle cx="-40" cy="-12" r="3" fill="#8aaa90"/>
          <circle cx="-30" cy="20" r="2" fill="#8aaa90"/>
        </g>
        
  <g stroke="#0e1a18" stroke-width="1.2" fill="none">
    <circle cx="140" cy="400" r="22" fill="#f1e4c4" opacity="0.85"/>
    <circle cx="140" cy="400" r="18"/>
    <line x1="140" y1="380" x2="140" y2="420"/>
    <line x1="120" y1="400" x2="160" y2="400"/>
    <path d="M 140 382 L 136 400 L 140 418 L 144 400 Z" fill="#0e1a18" opacity="0.8"/>
  </g>
        
  <g>
    <path d="M 320 420 Q 360 414 400 420 L 400 450 Q 360 444 320 450 Z" fill="#dee8e0" stroke="#0e1a18" stroke-width="1.2"/>
    <line x1="360" y1="420" x2="360" y2="446" stroke="#0e1a18" stroke-width="0.8"/>
    <line x1="326" y1="426" x2="352" y2="426" stroke="#0e1a18" stroke-width="0.5" opacity="0.6"/><line x1="326" y1="432" x2="352" y2="432" stroke="#0e1a18" stroke-width="0.5" opacity="0.6"/><line x1="326" y1="438" x2="352" y2="438" stroke="#0e1a18" stroke-width="0.5" opacity="0.6"/><line x1="326" y1="444" x2="352" y2="444" stroke="#0e1a18" stroke-width="0.5" opacity="0.6"/>
    <line x1="368" y1="426" x2="394" y2="426" stroke="#0e1a18" stroke-width="0.5" opacity="0.6"/><line x1="368" y1="432" x2="394" y2="432" stroke="#0e1a18" stroke-width="0.5" opacity="0.6"/><line x1="368" y1="438" x2="394" y2="438" stroke="#0e1a18" stroke-width="0.5" opacity="0.6"/><line x1="368" y1="444" x2="394" y2="444" stroke="#0e1a18" stroke-width="0.5" opacity="0.6"/>
  </g>
        <!-- 站者 -->
        <g transform="translate(180 360)" fill="#0e1a18" opacity="0.95">
          <ellipse cx="0" cy="0" rx="12" ry="15"/>
          <path d="M -18 12 L -24 60 L 24 60 L 18 12 Z"/>
          <ellipse cx="0" cy="-18" rx="10" ry="12" fill="#3e5a4a"/>
        </g>
        
  <g stroke="#8aaa90" stroke-width="1.4" fill="none" stroke-linecap="round">
    <path d="M 400 380 q -18 -8 -40 -20 q -20 -10 -50 -34"/>
    <ellipse cx="392" cy="374" rx="6" ry="2.4" transform="rotate(20 392 374)" fill="#8aaa90" opacity="0.75"/><ellipse cx="376" cy="368" rx="6" ry="2.4" transform="rotate(20 376 368)" fill="#8aaa90" opacity="0.75"/><ellipse cx="360" cy="362" rx="6" ry="2.4" transform="rotate(20 360 362)" fill="#8aaa90" opacity="0.75"/><ellipse cx="344" cy="356" rx="6" ry="2.4" transform="rotate(20 344 356)" fill="#8aaa90" opacity="0.75"/><ellipse cx="328" cy="350" rx="6" ry="2.4" transform="rotate(20 328 350)" fill="#8aaa90" opacity="0.75"/>
  </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#3e5a4a" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#3e5a4a" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#0e1a18" letter-spacing="14" font-weight="700">开普勒</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#3e5a4a" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#7a2a2a" filter="url(#ink-40)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#dee8e0" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="28" text-anchor="middle" font-family="serif" font-size="20" fill="#dee8e0" font-weight="900">和</text>
      <text x="32" y="54" text-anchor="middle" font-family="serif" font-size="20" fill="#dee8e0" font-weight="900">律</text>
      <g transform="rotate(-2 32 32)" opacity="0.95">
        <text x="14" y="22" text-anchor="middle" font-family="serif" font-size="16" fill="#dee8e0" font-weight="900">谐</text>
        <text x="50" y="50" text-anchor="middle" font-family="serif" font-size="16" fill="#dee8e0" font-weight="900">之</text>
      </g>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#3e5a4a" letter-spacing="2" opacity="0.7">天籁之和 · 镜心选镜</text>
</g>
</svg>