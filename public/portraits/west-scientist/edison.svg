      <rect x="0" y="0" width="64" height="64" fill="#6a2030" filter="url(#ink-40)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#e2e2ec" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="28" text-anchor="middle" font-family="serif" font-size="20" fill="#e2e2ec" font-weight="900">一</text>
      <text x="32" y="54" text-anchor="middle" font-family="serif" font-size="20" fill="#e2e2ec" font-weight="900">微</text>
      <g transform="rotate(-2 32 32)" opacity="0.95">
        <text x="14" y="22" text-anchor="middle" font-family="serif" font-size="16" fill="#e2e2ec" font-weight="900">灯</text>
        <text x="50" y="50" text-anchor="middle" font-family="serif" font-size="16" fill="#e2e2ec" font-weight="900">之</text>
      </g>
    </g>
