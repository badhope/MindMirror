          <!-- 光线 -->
          <line x1="22" y1="-30" x2="30" y2="-30" stroke="#6a2030" stroke-width="1.4" opacity="0.7"/><line x1="11.000000000000002" y1="-10.94744111674235" x2="15.000000000000004" y2="-4.019237886466843" stroke="#6a2030" stroke-width="1.4" opacity="0.7"/><line x1="-10.999999999999995" y1="-10.947441116742347" x2="-14.999999999999993" y2="-4.01923788646684" stroke="#6a2030" stroke-width="1.4" opacity="0.7"/><line x1="-22" y1="-29.999999999999996" x2="-30" y2="-29.999999999999996" stroke="#6a2030" stroke-width="1.4" opacity="0.7"/><line x1="-11.00000000000001" y1="-49.052558883257646" x2="-15.000000000000014" y2="-55.98076211353315" stroke="#6a2030" stroke-width="1.4" opacity="0.7"/><line x1="11.000000000000002" y1="-49.052558883257646" x2="15.000000000000004" y2="-55.98076211353316" stroke="#6a2030" stroke-width="1.4" opacity="0.7"/>
        </g>
