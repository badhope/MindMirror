<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-117" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="117" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-117" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="124" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-117" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="120" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-117">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-117" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="128" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#ece4d4"/>
  <rect x="0" y="0" width="480" height="640" fill="#ece4d4" filter="url(#paper-117)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-117" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#ece4d4" stop-opacity="0"/>
    <stop offset="100%" stop-color="#1a2030" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-117)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#1a2030" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#1a2030" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#5a6a82" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#1a2030" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#5a6a82" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#7a2a3a" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#7a2a3a" letter-spacing="2" font-weight="600">希腊</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#7a2a3a"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#ece4d4" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#1a2030" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">浴缸悟理</tspan><tspan x="0" dy="22">勿动吾圆</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#5a6a82" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#5a6a82" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g stroke="#5a6a82" stroke-width="1.2" fill="none">
    <rect x="72" y="260" width="16" height="190" fill="#5a6a82" opacity="0.4"/>
    <line x1="70" y1="264" x2="90" y2="264" stroke-width="2"/>
    <line x1="69" y1="256" x2="91" y2="256" stroke-width="2.2"/>
    <line x1="72" y1="452" x2="88" y2="452"/>
    <line x1="70" y1="456" x2="90" y2="456"/>
  </g>
        
  <g stroke="#5a6a82" stroke-width="1.2" fill="none">
    <rect x="392" y="260" width="16" height="190" fill="#5a6a82" opacity="0.4"/>
    <line x1="390" y1="264" x2="410" y2="264" stroke-width="2"/>
    <line x1="389" y1="256" x2="411" y2="256" stroke-width="2.2"/>
    <line x1="392" y1="452" x2="408" y2="452"/>
    <line x1="390" y1="456" x2="410" y2="456"/>
  </g>
        
  <g stroke="#5a6a82" stroke-width="1.6" fill="none">
    <path d="M 130 460 L 130 400 Q 240 370 350 400 L 350 460 Z" fill="#5a6a82" opacity="0.25"/>
    <path d="M 136 460 L 136 400 Q 240 376 344 400 L 344 460"/>
    <line x1="130" y1="460" x2="350" y2="460"/>
  </g>
        
  <g stroke="#7a2a3a" stroke-width="1.4" fill="none">
    <path d="M 115 288 L 123.33333333333333 276 L 131.66666666666666 284 L 140 272 L 148.33333333333334 284 L 156.66666666666666 276 L 165 288 Z" fill="#7a2a3a" opacity="0.7"/>
    <line x1="113" y1="288" x2="167" y2="288" stroke-width="2"/>
  </g>
        
  <g>
    <path d="M 320 420 Q 360 414 400 420 L 400 450 Q 360 444 320 450 Z" fill="#ece4d4" stroke="#1a2030" stroke-width="1.2"/>
    <line x1="360" y1="420" x2="360" y2="446" stroke="#1a2030" stroke-width="0.8"/>
    <line x1="326" y1="426" x2="352" y2="426" stroke="#1a2030" stroke-width="0.5" opacity="0.6"/><line x1="326" y1="432" x2="352" y2="432" stroke="#1a2030" stroke-width="0.5" opacity="0.6"/><line x1="326" y1="438" x2="352" y2="438" stroke="#1a2030" stroke-width="0.5" opacity="0.6"/><line x1="326" y1="444" x2="352" y2="444" stroke="#1a2030" stroke-width="0.5" opacity="0.6"/>
    <line x1="368" y1="426" x2="394" y2="426" stroke="#1a2030" stroke-width="0.5" opacity="0.6"/><line x1="368" y1="432" x2="394" y2="432" stroke="#1a2030" stroke-width="0.5" opacity="0.6"/><line x1="368" y1="438" x2="394" y2="438" stroke="#1a2030" stroke-width="0.5" opacity="0.6"/><line x1="368" y1="444" x2="394" y2="444" stroke="#1a2030" stroke-width="0.5" opacity="0.6"/>
  </g>
        <!-- 浴缸水纹 -->
        <g transform="translate(240 400)" fill="none" stroke="#7a8aa0" stroke-width="1.2" opacity="0.85">
          <ellipse cx="0" cy="0" rx="60" ry="14" fill="#7a8aa0" opacity="0.4"/>
          <path d="M -50 -4 q 10 -4 20 0 q 10 4 20 0 q 10 -4 20 0"/>
          <path d="M -56 4 q 14 -4 28 0 q 14 4 28 0 q 14 -4 28 0"/>
        </g>
        <!-- 几何（圆与球） -->
        <g transform="translate(140 380)" fill="none" stroke="#7a2a3a" stroke-width="1.4">
          <circle cx="0" cy="0" r="14"/>
          <circle cx="0" cy="0" r="6" fill="#7a2a3a" opacity="0.6"/>
        </g>
        <!-- 站者 -->
        <g transform="translate(240 340)" fill="#1a2030" opacity="0.95">
          <ellipse cx="0" cy="0" rx="12" ry="15"/>
          <path d="M -18 12 L -24 50 L 24 50 L 18 12 Z"/>
          <ellipse cx="0" cy="-18" rx="10" ry="12" fill="#5a6a82"/>
        </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#5a6a82" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#5a6a82" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#1a2030" letter-spacing="14" font-weight="700">阿基米德</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#5a6a82" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#7a2a3a" filter="url(#ink-53)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#ece4d4" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#ece4d4" font-weight="900">尤</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#ece4d4" font-weight="900">里</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#ece4d4" font-weight="900">卡</text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#5a6a82" letter-spacing="2" opacity="0.7">尤里卡 · 镜心选镜</text>
</g>
</svg>