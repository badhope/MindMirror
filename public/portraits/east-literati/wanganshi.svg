<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-99" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="99" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-99" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="106" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-99" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="102" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-99">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-99" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="110" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#dde9e6"/>
  <rect x="0" y="0" width="480" height="640" fill="#dde9e6" filter="url(#paper-99)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-99" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#dde9e6" stop-opacity="0"/>
    <stop offset="100%" stop-color="#142a28" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-99)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#142a28" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#142a28" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#3e6a68" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#142a28" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#3e6a68" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#902a2a" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#902a2a" letter-spacing="2" font-weight="600">宋</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#902a2a"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#dde9e6" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#142a28" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">天变不足畏</tspan><tspan x="0" dy="22">祖宗不足法</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#3e6a68" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#3e6a68" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 340 L 60 310 L 130 297.5 L 200 315 L 280 290 L 360 305 L 440 320 L 480 330 L 480 480 L 0 480 Z" fill="#5a8a88" opacity="0.35"/>
    <path d="M 0 364 L 80 349 L 170 336.5 L 260 354 L 340 334 L 420 351.5 L 480 361.5 L 480 480 L 0 480 Z" fill="#5a8a88" opacity="0.55"/>
  </g>
        <!-- 案上卷轴 -->
        <rect x="60" y="400" width="360" height="14" fill="#3e6a68" opacity="0.8"/>
        <rect x="60" y="414" width="360" height="4" fill="#142a28" opacity="0.5"/>
        <g transform="translate(120 360)" fill="#dde9e6" stroke="#3e6a68" stroke-width="0.8">
          <rect x="0" y="0" width="60" height="6"/>
          <rect x="0" y="8" width="60" height="6"/>
          <rect x="0" y="16" width="60" height="6"/>
          <line x1="2" y1="2" x2="58" y2="2" stroke-width="0.3"/>
          <line x1="2" y1="10" x2="58" y2="10" stroke-width="0.3"/>
          <line x1="2" y1="18" x2="58" y2="18" stroke-width="0.3"/>
        </g>
        
  <g>
    <rect x="276" y="376" width="48" height="8" fill="#dde9e6" stroke="#3e6a68" stroke-width="0.6"/>
    <line x1="278" y1="379" x2="322" y2="379" stroke="#3e6a68" stroke-width="0.4"/>
    <line x1="278" y1="381" x2="322" y2="381" stroke="#3e6a68" stroke-width="0.4"/>
  </g>
        
  <g>
    <ellipse cx="360" cy="432" rx="22" ry="6" fill="#142a28"/>
    <ellipse cx="360" cy="431" rx="18" ry="3" fill="#0a0a0a"/>
  </g>
        <!-- 站姿宰相 -->
        <g transform="translate(220 310)" fill="#142a28" opacity="0.9">
          <ellipse cx="0" cy="0" rx="12" ry="15"/>
          <path d="M -20 14 L -28 76 L 28 76 L 20 14 Z"/>
          <ellipse cx="0" cy="-18" rx="10" ry="12" fill="#3e6a68"/>
          <rect x="-3" y="-32" width="6" height="6" fill="#902a2a"/>
        </g>
        <!-- 笏板 -->
        <rect x="245" y="280" width="6" height="40" fill="#dde9e6" stroke="#3e6a68" stroke-width="0.6"/></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#3e6a68" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#3e6a68" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#142a28" letter-spacing="14" font-weight="700">王安石</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#3e6a68" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#902a2a" filter="url(#ink-40)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#dde9e6" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#dde9e6" font-weight="900">变</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#dde9e6" font-weight="900">法</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#dde9e6" font-weight="900">相</text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#3e6a68" letter-spacing="2" opacity="0.7">熙宁变法 · 镜心选镜</text>
</g>
</svg>