<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-113" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="113" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-113" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="120" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-113" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="116" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-113">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-113" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="124" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#faecc8"/>
  <rect x="0" y="0" width="480" height="640" fill="#faecc8" filter="url(#paper-113)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-113" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#faecc8" stop-opacity="0"/>
    <stop offset="100%" stop-color="#3a2008" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-113)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#3a2008" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#3a2008" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#b8842a" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#3a2008" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#b8842a" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#a82828" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#a82828" letter-spacing="2" font-weight="600">盛唐</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#a82828"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#faecc8" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#3a2008" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">千山鸟飞绝</tspan><tspan x="0" dy="22">独钓寒江雪</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#b8842a" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#b8842a" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 280 L 60 226 L 130 203.5 L 200 235 L 280 190 L 360 217 L 440 244 L 480 262 L 480 480 L 0 480 Z" fill="#d8a850" opacity="0.35"/>
    <path d="M 0 304 L 80 277 L 170 254.5 L 260 286 L 340 250 L 420 281.5 L 480 299.5 L 480 480 L 0 480 Z" fill="#d8a850" opacity="0.55"/>
  </g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 350 L 60 314 L 130 299 L 200 320 L 280 290 L 360 308 L 440 326 L 480 338 L 480 480 L 0 480 Z" fill="#d8a850" opacity="0.35"/>
    <path d="M 0 374 L 80 356 L 170 341 L 260 362 L 340 338 L 420 359 L 480 371 L 480 480 L 0 480 Z" fill="#d8a850" opacity="0.55"/>
  </g>
        
  <g stroke="#b8842a" stroke-width="0.8" fill="none" opacity="0.7">
    <path d="M 0 440 L 480 440" stroke-dasharray="4 4"/>
    <path d="M 0 452 L 480 452" stroke-dasharray="6 6" opacity="0.6"/>
    <path d="M 0 464 L 480 464" stroke-dasharray="8 8" opacity="0.45"/>
    <path d="M 0 476 L 480 476" stroke-dasharray="12 12" opacity="0.3"/>
  </g>
        
  <g stroke="#3a2008" stroke-width="1.4" fill="none" stroke-linecap="round">
    <path d="M 210 420 Q 240 434 270 420 L 262 416 L 218 416 Z" fill="#3a2008" opacity="0.6"/>
    <line x1="240" y1="416" x2="240" y2="384"/>
    <path d="M 240 388 L 244 412 L 236 412 Z" fill="#3a2008" opacity="0.5"/>
  </g>
        <!-- 钓者 -->
        <g transform="translate(240 400)" fill="#3a2008" opacity="0.9">
          <ellipse cx="0" cy="0" rx="9" ry="12"/>
          <path d="M -14 10 L -18 36 L 18 36 L 14 10 Z"/>
          <ellipse cx="0" cy="-14" rx="8" ry="10" fill="#b8842a"/>
        </g>
        <!-- 钓竿 -->
        <line x1="240" y1="380" x2="320" y2="350" stroke="#b8842a" stroke-width="1.2"/>
        <line x1="320" y1="350" x2="340" y2="370" stroke="#3a2008" stroke-width="0.4"/>
        <!-- 飞雪 -->
        <circle cx="40" cy="140" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="72" cy="157" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="104" cy="174" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="136" cy="191" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="168" cy="208" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="200" cy="145" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="232" cy="162" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="264" cy="179" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="296" cy="196" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="328" cy="213" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="360" cy="150" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="392" cy="167" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="424" cy="184" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="456" cy="201" r="1.5" fill="#1a1a1a" opacity="0.6"/>
        <circle cx="60" cy="220" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="98" cy="243" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="136" cy="266" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="174" cy="229" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="212" cy="252" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="250" cy="275" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="288" cy="238" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="326" cy="261" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="364" cy="224" r="1.5" fill="#1a1a1a" opacity="0.6"/><circle cx="402" cy="247" r="1.5" fill="#1a1a1a" opacity="0.6"/></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#b8842a" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#b8842a" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#3a2008" letter-spacing="14" font-weight="700">柳宗元</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#b8842a" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#a82828" filter="url(#ink-40)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#faecc8" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="28" text-anchor="middle" font-family="serif" font-size="20" fill="#faecc8" font-weight="900">永</text>
      <text x="32" y="54" text-anchor="middle" font-family="serif" font-size="20" fill="#faecc8" font-weight="900">记</text>
      <g transform="rotate(-2 32 32)" opacity="0.95">
        <text x="14" y="22" text-anchor="middle" font-family="serif" font-size="16" fill="#faecc8" font-weight="900">州</text>
        <text x="50" y="50" text-anchor="middle" font-family="serif" font-size="16" fill="#faecc8" font-weight="900">八</text>
      </g>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#b8842a" letter-spacing="2" opacity="0.7">独钓江雪 · 镜心选镜</text>
</g>
</svg>