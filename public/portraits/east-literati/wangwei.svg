    <path d="M 0 354 L 80 339 L 170 326.5 L 260 344 L 340 324 L 420 341.5 L 480 351.5 L 480 480 L 0 480 Z" fill="#d8a850" opacity="0.55"/>
  </g>
        
  <g stroke="#3a2008" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="80" y1="440" x2="80" y2="300"/>
    <line x1="74" y1="398" x2="86" y2="398"/>
    <line x1="75" y1="363" x2="85" y2="363"/>
    <line x1="74" y1="328" x2="86" y2="328"/>
    <path d="M 80 412 q -10 -4 -22 -8" />
    <path d="M 80 370 q 12 -6 24 -10" />
  </g>
        
  <g stroke="#3a2008" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="110" y1="440" x2="110" y2="320"/>
    <line x1="104" y1="404" x2="116" y2="404"/>
    <line x1="105" y1="374" x2="115" y2="374"/>
    <line x1="104" y1="344" x2="116" y2="344"/>
    <path d="M 110 416 q -10 -4 -22 -8" />
    <path d="M 110 380 q 12 -6 24 -10" />
  </g>
        
  <g stroke="#3a2008" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="400" y1="440" x2="400" y2="310"/>
    <line x1="394" y1="401" x2="406" y2="401"/>
    <line x1="395" y1="368.5" x2="405" y2="368.5"/>
    <line x1="394" y1="336" x2="406" y2="336"/>
    <path d="M 400 414 q -10 -4 -22 -8" />
    <path d="M 400 375 q 12 -6 24 -10" />
  </g>
        
  <g stroke="#3a2008" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="370" y1="440" x2="370" y2="340"/>
    <line x1="364" y1="410" x2="376" y2="410"/>
    <line x1="365" y1="385" x2="375" y2="385"/>
    <line x1="364" y1="360" x2="376" y2="360"/>
    <path d="M 370 420 q -10 -4 -22 -8" />
    <path d="M 370 390 q 12 -6 24 -10" />
  </g>
        
  <g>
    <circle cx="380" cy="120" r="24" fill="#faecc8" opacity="0.18"/>
    <circle cx="380" cy="120" r="20" fill="#faecc8" opacity="0.9"/>
  </g>
        
  <g fill="#faecc8" opacity="0.85">
    <ellipse cx="180" cy="150" rx="30" ry="6"/>
    <ellipse cx="168" cy="146" rx="10.799999999999999" ry="5"/>
    <ellipse cx="190.8" cy="147" rx="12" ry="4"/>
  </g>
        <!-- 坐石者 -->
        <ellipse cx="240" cy="430" rx="36" ry="10" fill="#b8842a" opacity="0.8"/>
        <g transform="translate(240 380)" fill="#3a2008" opacity="0.9">
          <ellipse cx="0" cy="0" rx="12" ry="15"/>
          <path d="M -18 12 L -22 50 L 22 50 L 18 12 Z"/>
          <ellipse cx="0" cy="-18" rx="10" ry="12" fill="#b8842a"/>
        </g>
        <!-- 琴横膝上 -->
        <g transform="translate(240 420)">
          <rect x="-26" y="-3" width="52" height="6" fill="#faecc8" stroke="#b8842a" stroke-width="0.8" rx="2"/>
          <line x1="-22" y1="0" x2="22" y2="0" stroke="#3a2008" stroke-width="0.3"/>
          <line x1="-22" y1="-1" x2="22" y2="-1" stroke="#3a2008" stroke-width="0.3"/>
          <line x1="-22" y1="1" x2="22" y2="1" stroke="#3a2008" stroke-width="0.3"/>
          <circle cx="-22" cy="0" r="1.4" fill="#a82828"/>
          <circle cx="22" cy="0" r="1.4" fill="#a82828"/>
        </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#b8842a" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#b8842a" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#3a2008" letter-spacing="14" font-weight="700">王维</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#b8842a" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#a82828" filter="url(#ink-27)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#faecc8" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#faecc8" font-weight="900">诗</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#faecc8" font-weight="900">佛</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#faecc8" font-weight="900">名</text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#b8842a" letter-spacing="2" opacity="0.7">辋川琴声 · 镜心选镜</text>
</g>
