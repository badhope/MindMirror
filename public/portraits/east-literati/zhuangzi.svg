<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-81" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="81" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-81" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="88" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-81" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="84" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-81">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-81" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="92" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#ece1c0"/>
  <rect x="0" y="0" width="480" height="640" fill="#ece1c0" filter="url(#paper-81)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-81" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#ece1c0" stop-opacity="0"/>
    <stop offset="100%" stop-color="#1f1408" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-81)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#1f1408" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#1f1408" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#5e3a20" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#1f1408" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#5e3a20" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#9a2828" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#9a2828" letter-spacing="2" font-weight="600">战国</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#9a2828"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#ece1c0" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#1f1408" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">庄周梦蝶</tspan><tspan x="0" dy="22">物我两忘</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#5e3a20" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#5e3a20" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 350 L 60 320 L 130 307.5 L 200 325 L 280 300 L 360 315 L 440 330 L 480 340 L 480 480 L 0 480 Z" fill="#8a5a30" opacity="0.35"/>
    <path d="M 0 374 L 80 359 L 170 346.5 L 260 364 L 340 344 L 420 361.5 L 480 371.5 L 480 480 L 0 480 Z" fill="#8a5a30" opacity="0.55"/>
  </g>
        <!-- 卧姿者 -->
        <g transform="translate(150 380)" fill="#1f1408" opacity="0.85">
          <path d="M -30 0 L 30 -4 L 50 6 L 50 18 L -30 18 Z"/>
          <ellipse cx="40" cy="-8" rx="12" ry="10" fill="#5e3a20"/>
          <ellipse cx="42" cy="-12" rx="2" ry="1" fill="#ece1c0"/>
        </g>
        <!-- 大蝶飞舞 -->
        <g transform="translate(310 200)" opacity="0.9">
          <path d="M 0 0 q -16 -22 -32 -8 q 4 -20 18 -16 q 8 -10 14 6 q 6 -16 14 -6 q 14 -4 18 16 q -16 -14 -32 8 Z" fill="#9a2828" stroke="#1f1408" stroke-width="0.6"/>
          <ellipse cx="0" cy="0" rx="2" ry="10" fill="#1f1408"/>
        </g>
        <g transform="translate(220 140) scale(0.6)" opacity="0.7">
          <path d="M 0 0 q -16 -22 -32 -8 q 4 -20 18 -16 q 8 -10 14 6 q 6 -16 14 -6 q 14 -4 18 16 q -16 -14 -32 8 Z" fill="#b88a4a" stroke="#1f1408" stroke-width="0.6"/>
        </g>
        <g transform="translate(380 280) scale(0.5)" opacity="0.7">
          <path d="M 0 0 q -16 -22 -32 -8 q 4 -20 18 -16 q 8 -10 14 6 q 6 -16 14 -6 q 14 -4 18 16 q -16 -14 -32 8 Z" fill="#9a2828" stroke="#1f1408" stroke-width="0.6"/>
        </g>
        <g stroke="#5e3a20" stroke-width="0.8" fill="none">
    <line x1="174" y1="460" x2="172" y2="452"/>
    <line x1="178" y1="460" x2="176" y2="454"/>
    <line x1="182" y1="460" x2="180" y2="453"/>
    <line x1="186" y1="460" x2="184" y2="454"/>
    <line x1="190" y1="460" x2="188" y2="452"/>
  </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#5e3a20" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#5e3a20" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#1f1408" letter-spacing="14" font-weight="700">庄子</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#5e3a20" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#9a2828" filter="url(#ink-27)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#ece1c0" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#ece1c0" font-weight="900">南</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#ece1c0" font-weight="900">华</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#ece1c0" font-weight="900">经</text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#5e3a20" letter-spacing="2" opacity="0.7">梦为蝴蝶 · 镜心选镜</text>
</g>
</svg>