  <path d="M 240 0 L 242 640" stroke="#1a2a18" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#4e6a4a" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#1a2a18" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
