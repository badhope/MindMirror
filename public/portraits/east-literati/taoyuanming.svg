<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#4e6a4a" letter-spacing="2" opacity="0.7">归园田居 · 镜心选镜</text>
