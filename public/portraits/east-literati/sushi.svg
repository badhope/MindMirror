<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-60" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="60" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-60" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="67" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-60" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="63" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-60">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-60" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="71" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#dde9e6"/>
  <rect x="0" y="0" width="480" height="640" fill="#dde9e6" filter="url(#paper-60)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-60" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#dde9e6" stop-opacity="0"/>
    <stop offset="100%" stop-color="#142a28" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-60)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#142a28" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#142a28" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#3e6a68" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#142a28" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#3e6a68" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#902a2a" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#902a2a" letter-spacing="2" font-weight="600">宋</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#902a2a"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#dde9e6" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#142a28" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">大江东去</tspan><tspan x="0" dy="22">浪淘尽</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#3e6a68" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#3e6a68" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 240 L 60 186 L 130 163.5 L 200 195 L 280 150 L 360 177 L 440 204 L 480 222 L 480 480 L 0 480 Z" fill="#5a8a88" opacity="0.35"/>
    <path d="M 0 264 L 80 237 L 170 214.5 L 260 246 L 340 210 L 420 241.5 L 480 259.5 L 480 480 L 0 480 Z" fill="#5a8a88" opacity="0.55"/>
  </g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 320 L 60 284 L 130 269 L 200 290 L 280 260 L 360 278 L 440 296 L 480 308 L 480 480 L 0 480 Z" fill="#5a8a88" opacity="0.35"/>
    <path d="M 0 344 L 80 326 L 170 311 L 260 332 L 340 308 L 420 329 L 480 341 L 480 480 L 0 480 Z" fill="#5a8a88" opacity="0.55"/>
  </g>
        
  <g stroke="#3e6a68" stroke-width="0.8" fill="none" opacity="0.7">
    <path d="M 0 420 L 480 420" stroke-dasharray="4 4"/>
    <path d="M 0 432 L 480 432" stroke-dasharray="6 6" opacity="0.6"/>
    <path d="M 0 444 L 480 444" stroke-dasharray="8 8" opacity="0.45"/>
    <path d="M 0 456 L 480 456" stroke-dasharray="12 12" opacity="0.3"/>
  </g>
        
  <g stroke="#3e6a68" stroke-width="0.8" fill="none" opacity="0.7">
    <path d="M 0 460 L 480 460" stroke-dasharray="4 4"/>
    <path d="M 0 472 L 480 472" stroke-dasharray="6 6" opacity="0.6"/>
    <path d="M 0 484 L 480 484" stroke-dasharray="8 8" opacity="0.45"/>
    <path d="M 0 496 L 480 496" stroke-dasharray="12 12" opacity="0.3"/>
  </g>
        
  <g>
    <circle cx="400" cy="100" r="28" fill="#dde9e6" opacity="0.18"/>
    <circle cx="400" cy="100" r="24" fill="#dde9e6" opacity="0.9"/>
  </g>
        
  <g fill="#dde9e6" opacity="0.85">
    <ellipse cx="160" cy="150" rx="35" ry="6"/>
    <ellipse cx="146" cy="146" rx="12.6" ry="5"/>
    <ellipse cx="172.6" cy="147" rx="14" ry="4"/>
  </g>
        
  <g stroke="#142a28" stroke-width="1.4" fill="none" stroke-linecap="round">
    <path d="M 210 400 Q 240 414 270 400 L 262 396 L 218 396 Z" fill="#142a28" opacity="0.6"/>
    <line x1="240" y1="396" x2="240" y2="364"/>
    <path d="M 240 368 L 244 392 L 236 392 Z" fill="#142a28" opacity="0.5"/>
  </g>
        <!-- 船上三人：苏子 + 二客 -->
        <g transform="translate(220 380)" fill="#142a28" opacity="0.95">
          <ellipse cx="0" cy="0" rx="11" ry="14"/>
          <path d="M -16 12 L -20 38 L 20 38 L 16 12 Z"/>
          <ellipse cx="0" cy="-16" rx="9" ry="11" fill="#3e6a68"/>
        </g>
        <g transform="translate(254 384)" fill="#142a28" opacity="0.85">
          <ellipse cx="0" cy="0" rx="8" ry="11"/>
          <path d="M -12 9 L -16 30 L 16 30 L 12 9 Z"/>
        </g>
        <g transform="translate(282 384)" fill="#142a28" opacity="0.85">
          <ellipse cx="0" cy="0" rx="8" ry="11"/>
          <path d="M -12 9 L -16 30 L 16 30 L 12 9 Z"/>
        </g>
        <!-- 杯 -->
        <ellipse cx="220" cy="378" rx="4" ry="2" fill="#dde9e6" stroke="#3e6a68" stroke-width="0.5"/>
        <line x1="216" y1="376" x2="216" y2="372" stroke="#142a28" stroke-width="0.5"/></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#3e6a68" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#3e6a68" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#142a28" letter-spacing="14" font-weight="700">苏轼</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#3e6a68" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#902a2a" filter="url(#ink-27)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#dde9e6" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#dde9e6" font-weight="900">东</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#dde9e6" font-weight="900">坡</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#dde9e6" font-weight="900">居</text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#3e6a68" letter-spacing="2" opacity="0.7">赤壁怀古 · 镜心选镜</text>
</g>
</svg>