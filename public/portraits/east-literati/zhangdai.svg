    <path d="M 0 320 L 60 290 L 130 277.5 L 200 295 L 280 270 L 360 285 L 440 300 L 480 310 L 480 480 L 0 480 Z" fill="#a83838" opacity="0.35"/>
    <path d="M 0 344 L 80 329 L 170 316.5 L 260 334 L 340 314 L 420 331.5 L 480 341.5 L 480 480 L 0 480 Z" fill="#a83838" opacity="0.55"/>
  </g>
        
  <g stroke="#8a2424" stroke-width="0.8" fill="none" opacity="0.7">
    <path d="M 0 440 L 480 440" stroke-dasharray="4 4"/>
    <path d="M 0 452 L 480 452" stroke-dasharray="6 6" opacity="0.6"/>
    <path d="M 0 464 L 480 464" stroke-dasharray="8 8" opacity="0.45"/>
    <path d="M 0 476 L 480 476" stroke-dasharray="12 12" opacity="0.3"/>
  </g>
        
  <g stroke="#1a0808" stroke-width="1.2" fill="none">
    <path d="M 212 350 L 240 330 L 268 350 Z" fill="#8a2424" opacity="0.85"/>
    <path d="M 208 350 L 240 324 L 272 350" fill="none"/>
    <line x1="220" y1="350" x2="220" y2="390"/>
