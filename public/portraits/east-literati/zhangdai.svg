        <!-- 亭中二人对坐 -->
        <g transform="translate(220 380)" fill="#1a0808" opacity="0.9">
          <ellipse cx="0" cy="0" rx="9" ry="12"/>
          <path d="M -14 9 L -18 30 L 18 30 L 14 9 Z"/>
        </g>
        <g transform="translate(260 380)" fill="#1a0808" opacity="0.9">
          <ellipse cx="0" cy="0" rx="9" ry="12"/>
          <path d="M -14 9 L -18 30 L 18 30 L 14 9 Z"/>
        </g>
        <!-- 炉 -->
        <ellipse cx="240" cy="392" rx="6" ry="2" fill="#9a2020"/>
        <ellipse cx="240" cy="389" rx="3" ry="2" fill="#c45a4a" opacity="0.85"/></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#8a2424" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#8a2424" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#1a0808" letter-spacing="14" font-weight="700">张岱</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#8a2424" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#9a2020" filter="url(#ink-27)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#f0d8d0" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#f0d8d0" font-weight="900">陶</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#f0d8d0" font-weight="900">庵</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#f0d8d0" font-weight="900">梦</text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#8a2424" letter-spacing="2" opacity="0.7">湖心亭看雪 · 镜心选镜</text>
</g>
</svg>