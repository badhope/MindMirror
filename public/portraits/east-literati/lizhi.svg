<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-60" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="60" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-60" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="67" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-60" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="63" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-60">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-60" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="71" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#f0d8d0"/>
  <rect x="0" y="0" width="480" height="640" fill="#f0d8d0" filter="url(#paper-60)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-60" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#f0d8d0" stop-opacity="0"/>
    <stop offset="100%" stop-color="#1a0808" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-60)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#1a0808" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#1a0808" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#8a2424" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#1a0808" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#8a2424" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#9a2020" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#9a2020" letter-spacing="2" font-weight="600">明</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#9a2020"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#f0d8d0" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#1a0808" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">童心即真</tspan><tspan x="0" dy="22">焚书自适</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#8a2424" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#8a2424" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g>
    <line x1="80" y1="156" x2="80" y2="166" stroke="#3a2010" stroke-width="0.8"/>
    <ellipse cx="80" cy="174" rx="10" ry="10" fill="#9a2020" opacity="0.85"/>
    <line x1="70" y1="174" x2="90" y2="174" stroke="#3a2010" stroke-width="0.6"/>
    <line x1="72" y1="180" x2="88" y2="180" stroke="#3a2010" stroke-width="0.6"/>
    <line x1="74" y1="186" x2="86" y2="186" stroke="#9a2020" stroke-width="0.8"/>
  </g>
        
  <g>
    <line x1="400" y1="156" x2="400" y2="166" stroke="#3a2010" stroke-width="0.8"/>
    <ellipse cx="400" cy="174" rx="10" ry="10" fill="#9a2020" opacity="0.85"/>
    <line x1="390" y1="174" x2="410" y2="174" stroke="#3a2010" stroke-width="0.6"/>
    <line x1="392" y1="180" x2="408" y2="180" stroke="#3a2010" stroke-width="0.6"/>
    <line x1="394" y1="186" x2="406" y2="186" stroke="#9a2020" stroke-width="0.8"/>
  </g>
        
  <g fill="#f0d8d0" opacity="0.85">
    <ellipse cx="240" cy="130" rx="40" ry="6"/>
    <ellipse cx="224" cy="126" rx="14.399999999999999" ry="5"/>
    <ellipse cx="254.4" cy="127" rx="16" ry="4"/>
  </g>
        <!-- 案 -->
        <rect x="80" y="400" width="320" height="14" fill="#8a2424" opacity="0.8"/>
        <rect x="80" y="414" width="320" height="4" fill="#1a0808" opacity="0.5"/>
        
  <g>
    <rect x="156" y="376" width="48" height="8" fill="#f0d8d0" stroke="#8a2424" stroke-width="0.6"/>
    <line x1="158" y1="379" x2="202" y2="379" stroke="#8a2424" stroke-width="0.4"/>
    <line x1="158" y1="381" x2="202" y2="381" stroke="#8a2424" stroke-width="0.4"/>
  </g>
        
  <g>
    <rect x="276" y="376" width="48" height="8" fill="#f0d8d0" stroke="#8a2424" stroke-width="0.6"/>
    <line x1="278" y1="379" x2="322" y2="379" stroke="#8a2424" stroke-width="0.4"/>
    <line x1="278" y1="381" x2="322" y2="381" stroke="#8a2424" stroke-width="0.4"/>
  </g>
        <!-- 烛 -->
        
  <g>
    <line x1="380" y1="352" x2="380" y2="380" stroke="#1a0808" stroke-width="2"/>
    <ellipse cx="380" cy="352" rx="2" ry="3" fill="#e8a028"/>
    <ellipse cx="380" cy="348" rx="3" ry="4" fill="#f8c848" opacity="0.85"/>
    <rect x="374" y="380" width="12" height="4" fill="#1a0808"/>
  </g>
        <!-- 坐姿者 -->
        <g transform="translate(220 320)" fill="#1a0808" opacity="0.9">
          <ellipse cx="0" cy="0" rx="13" ry="16"/>
          <path d="M -18 14 L -24 60 L 24 60 L 18 14 Z"/>
          <ellipse cx="0" cy="-18" rx="10" ry="12" fill="#8a2424"/>
          <ellipse cx="0" cy="20" rx="6" ry="3" fill="#9a2020" opacity="0.7"/>
        </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#8a2424" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#8a2424" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#1a0808" letter-spacing="14" font-weight="700">李贽</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#8a2424" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#9a2020" filter="url(#ink-27)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#f0d8d0" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#f0d8d0" font-weight="900">童</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#f0d8d0" font-weight="900">心</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#f0d8d0" font-weight="900">说</text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#8a2424" letter-spacing="2" opacity="0.7">童心是道 · 镜心选镜</text>
</g>
</svg>