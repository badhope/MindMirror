<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-99" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="99" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-99" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="106" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-99" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="102" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-99">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-99" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="110" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#f0d8d0"/>
  <rect x="0" y="0" width="480" height="640" fill="#f0d8d0" filter="url(#paper-99)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-99" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#f0d8d0" stop-opacity="0"/>
    <stop offset="100%" stop-color="#1a0808" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-99)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#1a0808" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#1a0808" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#8a2424" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#1a0808" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#8a2424" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#9a2020" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#9a2020" letter-spacing="2" font-weight="600">明</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#9a2020"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#f0d8d0" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#1a0808" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">六经责我</tspan><tspan x="0" dy="22">开生面</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#8a2424" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#8a2424" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 300 L 60 252 L 130 232 L 200 260 L 280 220 L 360 244 L 440 268 L 480 284 L 480 480 L 0 480 Z" fill="#a83838" opacity="0.35"/>
    <path d="M 0 324 L 80 300 L 170 280 L 260 308 L 340 276 L 420 304 L 480 320 L 480 480 L 0 480 Z" fill="#a83838" opacity="0.55"/>
  </g>
        
  <g stroke="#8a2424" stroke-width="0.8" fill="none" opacity="0.7">
    <path d="M 0 440 L 480 440" stroke-dasharray="4 4"/>
    <path d="M 0 452 L 480 452" stroke-dasharray="6 6" opacity="0.6"/>
    <path d="M 0 464 L 480 464" stroke-dasharray="8 8" opacity="0.45"/>
    <path d="M 0 476 L 480 476" stroke-dasharray="12 12" opacity="0.3"/>
  </g>
        
  <g stroke="#1a0808" stroke-width="1.2" fill="none">
    <path d="M 120 398 L 150 380 L 180 398 L 174 414 L 126 414 Z" fill="#1a0808" opacity="0.6"/>
    <line x1="132" y1="414" x2="132" y2="434"/>
    <line x1="168" y1="414" x2="168" y2="434"/>
    <line x1="120" y1="434" x2="180" y2="434"/>
    <rect x="146" y="416" width="8" height="14" fill="#1a0808" opacity="0.4"/>
  </g>
        
  <g stroke="#1a0808" stroke-width="1.2" fill="none">
    <path d="M 300 398 L 330 380 L 360 398 L 354 414 L 306 414 Z" fill="#1a0808" opacity="0.6"/>
    <line x1="312" y1="414" x2="312" y2="434"/>
    <line x1="348" y1="414" x2="348" y2="434"/>
    <line x1="300" y1="434" x2="360" y2="434"/>
    <rect x="326" y="416" width="8" height="14" fill="#1a0808" opacity="0.4"/>
  </g>
        <!-- 案上书卷成山 -->
        <rect x="80" y="380" width="320" height="12" fill="#8a2424" opacity="0.8"/>
        <rect x="110" y="350" width="40" height="30" fill="#f0d8d0" stroke="#8a2424" stroke-width="0.8"/><rect x="160" y="344" width="40" height="30" fill="#f0d8d0" stroke="#8a2424" stroke-width="0.8"/><rect x="210" y="338" width="40" height="30" fill="#f0d8d0" stroke="#8a2424" stroke-width="0.8"/><rect x="260" y="332" width="40" height="30" fill="#f0d8d0" stroke="#8a2424" stroke-width="0.8"/>
        <!-- 坐者 -->
        <g transform="translate(240 320)" fill="#1a0808" opacity="0.9">
          <ellipse cx="0" cy="0" rx="12" ry="15"/>
          <path d="M -18 12 L -22 50 L 22 50 L 18 12 Z"/>
          <ellipse cx="0" cy="-18" rx="10" ry="12" fill="#8a2424"/>
        </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#8a2424" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#8a2424" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#1a0808" letter-spacing="14" font-weight="700">王夫之</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#8a2424" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#9a2020" filter="url(#ink-40)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#f0d8d0" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#f0d8d0" font-weight="900">船</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#f0d8d0" font-weight="900">山</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#f0d8d0" font-weight="900">学</text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#8a2424" letter-spacing="2" opacity="0.7">船山著述 · 镜心选镜</text>
</g>
</svg>