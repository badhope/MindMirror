    <line x1="394" y1="206" x2="406" y2="206" stroke="#8a2848" stroke-width="0.8"/>
  </g>
        <!-- 案上梅花 -->
        <rect x="140" y="400" width="200" height="12" fill="#5a3a68" opacity="0.8"/>
        <g transform="translate(240 380)">
          <line x1="0" y1="0" x2="0" y2="20" stroke="#1a0a20" stroke-width="1.4"/>
          <circle cx="-3" cy="-2" r="3" fill="#8a2848"/>
          <circle cx="3" cy="2" r="3" fill="#8a2848"/>
          <circle cx="-2" cy="6" r="3" fill="#8a2848"/>
          <circle cx="4" cy="12" r="3" fill="#8a2848"/>
        </g>
        <!-- 坐者 -->
        <g transform="translate(220 330)" fill="#1a0a20" opacity="0.95">
          <ellipse cx="0" cy="0" rx="12" ry="15"/>
          <path d="M -18 12 L -22 50 L 22 50 L 18 12 Z"/>
          <ellipse cx="0" cy="-18" rx="10" ry="12" fill="#5a3a68"/>
        </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#5a3a68" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#5a3a68" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#1a0a20" letter-spacing="14" font-weight="700">袁枚</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#5a3a68" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#8a2848" filter="url(#ink-27)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#e6dcec" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#e6dcec" font-weight="900">随</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#e6dcec" font-weight="900">园</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#e6dcec" font-weight="900">主</text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#5a3a68" letter-spacing="2" opacity="0.7">随园诗话 · 镜心选镜</text>
</g>
