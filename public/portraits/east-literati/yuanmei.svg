    <path d="M 100 385 q 12 -6 24 -10" />
  </g>
        
  <g stroke="#1a0a20" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="400" y1="440" x2="400" y2="310"/>
    <line x1="394" y1="401" x2="406" y2="401"/>
    <line x1="395" y1="368.5" x2="405" y2="368.5"/>
    <line x1="394" y1="336" x2="406" y2="336"/>
    <path d="M 400 414 q -10 -4 -22 -8" />
    <path d="M 400 375 q 12 -6 24 -10" />
  </g>
        
  <g stroke="#1a0a20" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="370" y1="440" x2="370" y2="330"/>
    <line x1="364" y1="407" x2="376" y2="407"/>
    <line x1="365" y1="379.5" x2="375" y2="379.5"/>
    <line x1="364" y1="352" x2="376" y2="352"/>
    <path d="M 370 418 q -10 -4 -22 -8" />
    <path d="M 370 385 q 12 -6 24 -10" />
  </g>
        
  <g>
    <line x1="80" y1="176" x2="80" y2="186" stroke="#3a2010" stroke-width="0.8"/>
    <ellipse cx="80" cy="194" rx="10" ry="10" fill="#8a2848" opacity="0.85"/>
    <line x1="70" y1="194" x2="90" y2="194" stroke="#3a2010" stroke-width="0.6"/>
    <line x1="72" y1="200" x2="88" y2="200" stroke="#3a2010" stroke-width="0.6"/>
    <line x1="74" y1="206" x2="86" y2="206" stroke="#8a2848" stroke-width="0.8"/>
  </g>
        
  <g>
    <line x1="400" y1="176" x2="400" y2="186" stroke="#3a2010" stroke-width="0.8"/>
    <ellipse cx="400" cy="194" rx="10" ry="10" fill="#8a2848" opacity="0.85"/>
    <line x1="390" y1="194" x2="410" y2="194" stroke="#3a2010" stroke-width="0.6"/>
