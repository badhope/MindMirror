<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-92" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="92" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-92" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="99" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-92" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="95" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-92">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-92" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="103" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#ece1c0"/>
  <rect x="0" y="0" width="480" height="640" fill="#ece1c0" filter="url(#paper-92)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-92" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#ece1c0" stop-opacity="0"/>
    <stop offset="100%" stop-color="#1f1408" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-92)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#1f1408" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#1f1408" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#5e3a20" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#1f1408" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#5e3a20" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#9a2828" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#9a2828" letter-spacing="2" font-weight="600">战国</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#9a2828"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#ece1c0" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#1f1408" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">孤愤著书</tspan><tspan x="0" dy="22">法家集大成</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#5e3a20" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#5e3a20" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 350 L 60 326 L 130 316 L 200 330 L 280 310 L 360 322 L 440 334 L 480 342 L 480 480 L 0 480 Z" fill="#8a5a30" opacity="0.35"/>
    <path d="M 0 374 L 80 362 L 170 352 L 260 366 L 340 350 L 420 364 L 480 372 L 480 480 L 0 480 Z" fill="#8a5a30" opacity="0.55"/>
  </g>
        
  <g>
    <ellipse cx="240" cy="440" rx="22" ry="6" fill="#1f1408"/>
    <ellipse cx="240" cy="439" rx="18" ry="3" fill="#0a0a0a"/>
  </g>
        <!-- 案 -->
        <rect x="100" y="380" width="280" height="14" fill="#5e3a20" opacity="0.8"/>
        <rect x="100" y="394" width="280" height="4" fill="#1f1408" opacity="0.5"/>
        <!-- 竹简成卷 -->
        <g transform="translate(140 360)" fill="#ece1c0" stroke="#5e3a20" stroke-width="0.8" opacity="0.9">
          <rect x="0" y="0" width="80" height="6"/>
          <line x1="2" y1="2" x2="78" y2="2" stroke-width="0.3"/>
          <line x1="2" y1="4" x2="78" y2="4" stroke-width="0.3"/>
          <rect x="0" y="8" width="80" height="6"/>
          <line x1="2" y1="10" x2="78" y2="10" stroke-width="0.3"/>
          <rect x="0" y="16" width="80" height="6"/>
          <line x1="2" y1="18" x2="78" y2="18" stroke-width="0.3"/>
        </g>
        <!-- 坐姿者 -->
        <g transform="translate(290 320)" fill="#1f1408" opacity="0.9">
          <ellipse cx="0" cy="0" rx="12" ry="15"/>
          <path d="M -16 12 L -22 50 L 22 50 L 16 12 Z"/>
          <ellipse cx="0" cy="-16" rx="9" ry="11" fill="#5e3a20"/>
        </g>
        <!-- 笔 -->
        <line x1="200" y1="358" x2="218" y2="368" stroke="#1f1408" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="218" y1="368" x2="226" y2="362" stroke="#b88a4a" stroke-width="1.6" stroke-linecap="round"/></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#5e3a20" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#5e3a20" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#1f1408" letter-spacing="14" font-weight="700">韩非子</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#5e3a20" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#9a2828" filter="url(#ink-40)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#ece1c0" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#ece1c0" font-weight="900">韩</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#ece1c0" font-weight="900">非</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#ece1c0" font-weight="900">子</text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#5e3a20" letter-spacing="2" opacity="0.7">孤愤难鸣 · 镜心选镜</text>
</g>
</svg>