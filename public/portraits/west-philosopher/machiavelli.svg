<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-135" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="135" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-135" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="142" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-135" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="138" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-135">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-135" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="146" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#e8dec8"/>
  <rect x="0" y="0" width="480" height="640" fill="#e8dec8" filter="url(#paper-135)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-135" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#e8dec8" stop-opacity="0"/>
    <stop offset="100%" stop-color="#20140a" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-135)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#20140a" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#20140a" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#6a4a28" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#20140a" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#6a4a28" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#8a2020" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#8a2020" letter-spacing="2" font-weight="600">经院</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#8a2020"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#e8dec8" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#20140a" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">君主之论</tspan><tspan x="0" dy="22">德与运</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#6a4a28" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#6a4a28" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        <!-- 城堡 -->
        <g transform="translate(60 320)" fill="#6a4a28" opacity="0.85" stroke="#20140a" stroke-width="1.4">
          <rect x="0" y="20" width="100" height="120"/>
          <path d="M 0 20 L 0 0 L 14 0 L 14 20 Z"/>
          <path d="M 32 20 L 32 0 L 46 0 L 46 20 Z"/>
          <path d="M 64 20 L 64 0 L 78 0 L 78 20 Z"/>
          <path d="M 86 20 L 86 0 L 100 0 L 100 20 Z"/>
          <rect x="20" y="60" width="14" height="20" fill="#20140a"/>
          <rect x="66" y="60" width="14" height="20" fill="#20140a"/>
        </g>
        <g transform="translate(320 320)" fill="#6a4a28" opacity="0.85" stroke="#20140a" stroke-width="1.4">
          <rect x="0" y="20" width="100" height="120"/>
          <path d="M 0 20 L 0 0 L 14 0 L 14 20 Z"/>
          <path d="M 32 20 L 32 0 L 46 0 L 46 20 Z"/>
          <path d="M 64 20 L 64 0 L 78 0 L 78 20 Z"/>
          <path d="M 86 20 L 86 0 L 100 0 L 100 20 Z"/>
        </g>
        
  <g>
    <line x1="140" y1="352" x2="140" y2="380" stroke="#20140a" stroke-width="2"/>
    <ellipse cx="140" cy="352" rx="2" ry="3" fill="#e8a028"/>
    <ellipse cx="140" cy="348" rx="3" ry="4" fill="#f8c848" opacity="0.85"/>
    <rect x="134" y="380" width="12" height="4" fill="#20140a"/>
  </g>
        
  <g>
    <path d="M 260 400 Q 300 394 340 400 L 340 430 Q 300 424 260 430 Z" fill="#e8dec8" stroke="#20140a" stroke-width="1.2"/>
    <line x1="300" y1="400" x2="300" y2="426" stroke="#20140a" stroke-width="0.8"/>
    <line x1="266" y1="406" x2="292" y2="406" stroke="#20140a" stroke-width="0.5" opacity="0.6"/><line x1="266" y1="412" x2="292" y2="412" stroke="#20140a" stroke-width="0.5" opacity="0.6"/><line x1="266" y1="418" x2="292" y2="418" stroke="#20140a" stroke-width="0.5" opacity="0.6"/><line x1="266" y1="424" x2="292" y2="424" stroke="#20140a" stroke-width="0.5" opacity="0.6"/>
    <line x1="308" y1="406" x2="334" y2="406" stroke="#20140a" stroke-width="0.5" opacity="0.6"/><line x1="308" y1="412" x2="334" y2="412" stroke="#20140a" stroke-width="0.5" opacity="0.6"/><line x1="308" y1="418" x2="334" y2="418" stroke="#20140a" stroke-width="0.5" opacity="0.6"/><line x1="308" y1="424" x2="334" y2="424" stroke="#20140a" stroke-width="0.5" opacity="0.6"/>
  </g>
        <!-- 桌 -->
        <rect x="180" y="420" width="120" height="14" fill="#6a4a28" opacity="0.85"/>
        <!-- 写者 -->
        <g transform="translate(240 340)" fill="#20140a" opacity="0.95">
          <ellipse cx="0" cy="0" rx="13" ry="16"/>
          <path d="M -20 14 L -26 50 L 26 50 L 20 14 Z"/>
          <ellipse cx="0" cy="-20" rx="11" ry="13" fill="#6a4a28"/>
          <line x1="-20" y1="6" x2="-40" y2="0" stroke="#20140a" stroke-width="1.6"/>
        </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#6a4a28" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#6a4a28" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#20140a" letter-spacing="14" font-weight="700">马基雅维利</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#6a4a28" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#8a2020" filter="url(#ink-66)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#e8dec8" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="28" text-anchor="middle" font-family="serif" font-size="20" fill="#e8dec8" font-weight="900">权</text>
      <text x="32" y="54" text-anchor="middle" font-family="serif" font-size="20" fill="#e8dec8" font-weight="900">真</text>
      <g transform="rotate(-2 32 32)" opacity="0.95">
        <text x="14" y="22" text-anchor="middle" font-family="serif" font-size="16" fill="#e8dec8" font-weight="900">术</text>
        <text x="50" y="50" text-anchor="middle" font-family="serif" font-size="16" fill="#e8dec8" font-weight="900">之</text>
      </g>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#6a4a28" letter-spacing="2" opacity="0.7">城堡之笔 · 镜心选镜</text>
</g>
</svg>