<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-142" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="142" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-142" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="149" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-142" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="145" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-142">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-142" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="153" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#e2e2ec"/>
  <rect x="0" y="0" width="480" height="640" fill="#e2e2ec" filter="url(#paper-142)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-142" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#e2e2ec" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0a0a20" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-142)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#0a0a20" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#0a0a20" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#3a3a5a" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#0a0a20" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#3a3a5a" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#6a2030" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#6a2030" letter-spacing="2" font-weight="600">近代</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#6a2030"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#e2e2ec" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#0a0a20" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">逻辑哲学</tspan><tspan x="0" dy="22">语言之限</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#3a3a5a" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#3a3a5a" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        <!-- 楼梯 -->
        <g stroke="#0a0a20" stroke-width="2" fill="#3a3a5a" opacity="0.85">
          <rect x="60" y="380" width="40" height="80"/>
          <rect x="100" y="340" width="40" height="120"/>
          <rect x="140" y="300" width="40" height="160"/>
          <rect x="180" y="260" width="40" height="200"/>
        </g>
        <!-- 几何 -->
        <g transform="translate(340 280)" stroke="#6a2030" stroke-width="1.6" fill="none" opacity="0.85">
          <polygon points="0,-30 26,15 -26,15"/>
          <line x1="0" y1="-30" x2="0" y2="15"/>
        </g>
        
  <g>
    <path d="M 260 400 Q 300 394 340 400 L 340 430 Q 300 424 260 430 Z" fill="#e2e2ec" stroke="#0a0a20" stroke-width="1.2"/>
    <line x1="300" y1="400" x2="300" y2="426" stroke="#0a0a20" stroke-width="0.8"/>
    <line x1="266" y1="406" x2="292" y2="406" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/><line x1="266" y1="412" x2="292" y2="412" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/><line x1="266" y1="418" x2="292" y2="418" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/><line x1="266" y1="424" x2="292" y2="424" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/>
    <line x1="308" y1="406" x2="334" y2="406" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/><line x1="308" y1="412" x2="334" y2="412" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/><line x1="308" y1="418" x2="334" y2="418" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/><line x1="308" y1="424" x2="334" y2="424" stroke="#0a0a20" stroke-width="0.5" opacity="0.6"/>
  </g>
        <!-- 沉思者 -->
        <g transform="translate(360 360)" fill="#0a0a20" opacity="0.95">
          <ellipse cx="0" cy="0" rx="13" ry="16"/>
          <path d="M -20 14 L -26 60 L 26 60 L 20 14 Z"/>
          <ellipse cx="0" cy="-20" rx="11" ry="13" fill="#3a3a5a"/>
        </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#3a3a5a" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#3a3a5a" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#0a0a20" letter-spacing="14" font-weight="700">维特根斯坦</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#3a3a5a" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#6a2030" filter="url(#ink-66)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#e2e2ec" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#e2e2ec" font-weight="900">可</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#e2e2ec" font-weight="900">言</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#e2e2ec" font-weight="900">与</text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#3a3a5a" letter-spacing="2" opacity="0.7">梯上之思 · 镜心选镜</text>
</g>
</svg>