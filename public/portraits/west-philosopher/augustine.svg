<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-110" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="110" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-110" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="117" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-110" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="113" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-110">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-110" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="121" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#e8dec8"/>
  <rect x="0" y="0" width="480" height="640" fill="#e8dec8" filter="url(#paper-110)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-110" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#e8dec8" stop-opacity="0"/>
    <stop offset="100%" stop-color="#20140a" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-110)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#20140a" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#20140a" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#6a4a28" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#20140a" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#6a4a28" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#8a2020" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#8a2020" letter-spacing="2" font-weight="600">经院</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#8a2020"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#e8dec8" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#20140a" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">忏悔之录</tspan><tspan x="0" dy="22">上帝之城</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#6a4a28" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#6a4a28" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        <!-- 教堂拱门 -->
        <g transform="translate(240 460)" fill="#6a4a28" opacity="0.85" stroke="#20140a" stroke-width="1.4">
          <path d="M -100 0 L -100 -160 Q 0 -240 100 -160 L 100 0 Z"/>
          <path d="M -76 0 L -76 -150 Q 0 -220 76 -150 L 76 0" fill="#e8dec8" opacity="0.4"/>
          <line x1="0" y1="-220" x2="0" y2="0" stroke-width="1.4"/>
        </g>
        
  <g>
    <line x1="140" y1="352" x2="140" y2="380" stroke="#20140a" stroke-width="2"/>
    <ellipse cx="140" cy="352" rx="2" ry="3" fill="#e8a028"/>
    <ellipse cx="140" cy="348" rx="3" ry="4" fill="#f8c848" opacity="0.85"/>
    <rect x="134" y="380" width="12" height="4" fill="#20140a"/>
  </g>
        
  <g>
    <line x1="340" y1="352" x2="340" y2="380" stroke="#20140a" stroke-width="2"/>
    <ellipse cx="340" cy="352" rx="2" ry="3" fill="#e8a028"/>
    <ellipse cx="340" cy="348" rx="3" ry="4" fill="#f8c848" opacity="0.85"/>
    <rect x="334" y="380" width="12" height="4" fill="#20140a"/>
  </g>
        
  <g>
    <path d="M 200 400 Q 240 394 280 400 L 280 430 Q 240 424 200 430 Z" fill="#e8dec8" stroke="#20140a" stroke-width="1.2"/>
    <line x1="240" y1="400" x2="240" y2="426" stroke="#20140a" stroke-width="0.8"/>
    <line x1="206" y1="406" x2="232" y2="406" stroke="#20140a" stroke-width="0.5" opacity="0.6"/><line x1="206" y1="412" x2="232" y2="412" stroke="#20140a" stroke-width="0.5" opacity="0.6"/><line x1="206" y1="418" x2="232" y2="418" stroke="#20140a" stroke-width="0.5" opacity="0.6"/><line x1="206" y1="424" x2="232" y2="424" stroke="#20140a" stroke-width="0.5" opacity="0.6"/>
    <line x1="248" y1="406" x2="274" y2="406" stroke="#20140a" stroke-width="0.5" opacity="0.6"/><line x1="248" y1="412" x2="274" y2="412" stroke="#20140a" stroke-width="0.5" opacity="0.6"/><line x1="248" y1="418" x2="274" y2="418" stroke="#20140a" stroke-width="0.5" opacity="0.6"/><line x1="248" y1="424" x2="274" y2="424" stroke="#20140a" stroke-width="0.5" opacity="0.6"/>
  </g>
        <!-- 跪者 -->
        <g transform="translate(240 360)" fill="#20140a" opacity="0.95">
          <ellipse cx="0" cy="0" rx="11" ry="14"/>
          <path d="M -16 12 L -22 36 L 22 36 L 16 12 Z"/>
          <ellipse cx="0" cy="-18" rx="9" ry="11" fill="#6a4a28"/>
        </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#6a4a28" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#6a4a28" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#20140a" letter-spacing="14" font-weight="700">奥古斯丁</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#6a4a28" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#8a2020" filter="url(#ink-53)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#e8dec8" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#e8dec8" font-weight="900">我</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#e8dec8" font-weight="900">信</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#e8dec8" font-weight="900">以</text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#6a4a28" letter-spacing="2" opacity="0.7">圣奥之思 · 镜心选镜</text>
</g>
</svg>