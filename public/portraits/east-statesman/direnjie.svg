<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-92" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="92" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-92" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="99" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-92" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="95" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-92">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-92" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="103" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#faecc8"/>
  <rect x="0" y="0" width="480" height="640" fill="#faecc8" filter="url(#paper-92)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-92" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#faecc8" stop-opacity="0"/>
    <stop offset="100%" stop-color="#3a2008" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-92)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#3a2008" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#3a2008" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#b8842a" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#3a2008" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#b8842a" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#a82828" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#a82828" letter-spacing="2" font-weight="600">盛唐</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#a82828"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#faecc8" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#3a2008" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">一年断狱</tspan><tspan x="0" dy="22">复唐之功</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#b8842a" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#b8842a" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 320 L 60 290 L 130 277.5 L 200 295 L 280 270 L 360 285 L 440 300 L 480 310 L 480 480 L 0 480 Z" fill="#d8a850" opacity="0.35"/>
    <path d="M 0 344 L 80 329 L 170 316.5 L 260 334 L 340 314 L 420 331.5 L 480 341.5 L 480 480 L 0 480 Z" fill="#d8a850" opacity="0.55"/>
  </g>
        
  <g>
    <line x1="80" y1="176" x2="80" y2="186" stroke="#3a2010" stroke-width="0.8"/>
    <ellipse cx="80" cy="194" rx="10" ry="10" fill="#a82828" opacity="0.85"/>
    <line x1="70" y1="194" x2="90" y2="194" stroke="#3a2010" stroke-width="0.6"/>
    <line x1="72" y1="200" x2="88" y2="200" stroke="#3a2010" stroke-width="0.6"/>
    <line x1="74" y1="206" x2="86" y2="206" stroke="#a82828" stroke-width="0.8"/>
  </g>
        <!-- 案 -->
        <rect x="60" y="400" width="360" height="14" fill="#b8842a" opacity="0.85"/>
        <!-- 案卷 -->
        <g transform="translate(90 360)">
          <rect x="0" y="0" width="44" height="40" fill="#faecc8" stroke="#b8842a" stroke-width="0.6"/>
          <line x1="2" y1="6" x2="42" y2="6" stroke-width="0.3"/>
          <line x1="2" y1="14" x2="42" y2="14" stroke-width="0.3"/>
          <line x1="2" y1="22" x2="42" y2="22" stroke-width="0.3"/>
        </g><g transform="translate(146 360)">
          <rect x="0" y="0" width="44" height="40" fill="#faecc8" stroke="#b8842a" stroke-width="0.6"/>
          <line x1="2" y1="6" x2="42" y2="6" stroke-width="0.3"/>
          <line x1="2" y1="14" x2="42" y2="14" stroke-width="0.3"/>
          <line x1="2" y1="22" x2="42" y2="22" stroke-width="0.3"/>
        </g><g transform="translate(202 360)">
          <rect x="0" y="0" width="44" height="40" fill="#faecc8" stroke="#b8842a" stroke-width="0.6"/>
          <line x1="2" y1="6" x2="42" y2="6" stroke-width="0.3"/>
          <line x1="2" y1="14" x2="42" y2="14" stroke-width="0.3"/>
          <line x1="2" y1="22" x2="42" y2="22" stroke-width="0.3"/>
        </g><g transform="translate(258 360)">
          <rect x="0" y="0" width="44" height="40" fill="#faecc8" stroke="#b8842a" stroke-width="0.6"/>
          <line x1="2" y1="6" x2="42" y2="6" stroke-width="0.3"/>
          <line x1="2" y1="14" x2="42" y2="14" stroke-width="0.3"/>
          <line x1="2" y1="22" x2="42" y2="22" stroke-width="0.3"/>
        </g><g transform="translate(314 360)">
          <rect x="0" y="0" width="44" height="40" fill="#faecc8" stroke="#b8842a" stroke-width="0.6"/>
          <line x1="2" y1="6" x2="42" y2="6" stroke-width="0.3"/>
          <line x1="2" y1="14" x2="42" y2="14" stroke-width="0.3"/>
          <line x1="2" y1="22" x2="42" y2="22" stroke-width="0.3"/>
        </g>
        <!-- 惊堂木 -->
        <rect x="370" y="406" width="14" height="6" fill="#a82828"/>
        <!-- 坐者 -->
        <g transform="translate(220 320)" fill="#3a2008" opacity="0.95">
          <ellipse cx="0" cy="0" rx="12" ry="15"/>
          <path d="M -18 12 L -24 60 L 24 60 L 18 12 Z"/>
          <ellipse cx="0" cy="-18" rx="10" ry="12" fill="#b8842a"/>
        </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#b8842a" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#b8842a" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#3a2008" letter-spacing="14" font-weight="700">狄仁杰</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#b8842a" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#a82828" filter="url(#ink-40)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#faecc8" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="28" text-anchor="middle" font-family="serif" font-size="20" fill="#faecc8" font-weight="900">神</text>
      <text x="32" y="54" text-anchor="middle" font-family="serif" font-size="20" fill="#faecc8" font-weight="900">狱</text>
      <g transform="rotate(-2 32 32)" opacity="0.95">
        <text x="14" y="22" text-anchor="middle" font-family="serif" font-size="16" fill="#faecc8" font-weight="900">探</text>
        <text x="50" y="50" text-anchor="middle" font-family="serif" font-size="16" fill="#faecc8" font-weight="900">断</text>
      </g>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#b8842a" letter-spacing="2" opacity="0.7">神探狄公 · 镜心选镜</text>
</g>
</svg>