<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-67" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="67" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-67" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="74" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-67" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="70" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-67">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-67" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="78" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#dde9e6"/>
  <rect x="0" y="0" width="480" height="640" fill="#dde9e6" filter="url(#paper-67)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-67" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#dde9e6" stop-opacity="0"/>
    <stop offset="100%" stop-color="#142a28" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-67)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#142a28" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#142a28" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#3e6a68" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#142a28" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#3e6a68" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#902a2a" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#902a2a" letter-spacing="2" font-weight="600">宋</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#902a2a"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#dde9e6" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#142a28" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">还我河山</tspan><tspan x="0" dy="22">壮志饥餐</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#3e6a68" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#3e6a68" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 280 L 60 238 L 130 220.5 L 200 245 L 280 210 L 360 231 L 440 252 L 480 266 L 480 480 L 0 480 Z" fill="#5a8a88" opacity="0.35"/>
    <path d="M 0 304 L 80 283 L 170 265.5 L 260 290 L 340 262 L 420 286.5 L 480 300.5 L 480 480 L 0 480 Z" fill="#5a8a88" opacity="0.55"/>
  </g>
        
  <g fill="#dde9e6" opacity="0.85">
    <ellipse cx="140" cy="140" rx="35" ry="6"/>
    <ellipse cx="126" cy="136" rx="12.6" ry="5"/>
    <ellipse cx="152.6" cy="137" rx="14" ry="4"/>
  </g>
        <!-- 战马 -->
        <g transform="translate(160 400)" fill="#142a28" stroke="#3e6a68" stroke-width="1.4">
          <ellipse cx="0" cy="0" rx="36" ry="14"/>
          <ellipse cx="32" cy="-8" rx="14" ry="10"/>
          <line x1="-22" y1="8" x2="-24" y2="22"/>
          <line x1="-4" y1="12" x2="-6" y2="22"/>
          <line x1="16" y1="10" x2="14" y2="22"/>
          <line x1="28" y1="6" x2="30" y2="22"/>
          <line x1="30" y1="-16" x2="36" y2="-24"/>
        </g>
        <!-- 立马将军 -->
        <g transform="translate(180 350)" fill="#142a28" opacity="0.95">
          <ellipse cx="0" cy="0" rx="12" ry="15"/>
          <path d="M -20 12 L -26 60 L 26 60 L 20 12 Z"/>
          <ellipse cx="0" cy="-18" rx="10" ry="12" fill="#3e6a68"/>
        </g>
        <!-- 枪 -->
        <line x1="200" y1="330" x2="220" y2="220" stroke="#142a28" stroke-width="2.2"/>
        <!-- 旗 -->
        <g transform="translate(220 220)">
          <path d="M 0 0 L 24 -4 L 30 8 L 0 12 Z" fill="#902a2a" opacity="0.85"/>
        </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#3e6a68" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#3e6a68" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#142a28" letter-spacing="14" font-weight="700">岳飞</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#3e6a68" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#902a2a" filter="url(#ink-27)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#dde9e6" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="28" text-anchor="middle" font-family="serif" font-size="20" fill="#dde9e6" font-weight="900">精</text>
      <text x="32" y="54" text-anchor="middle" font-family="serif" font-size="20" fill="#dde9e6" font-weight="900">国</text>
      <g transform="rotate(-2 32 32)" opacity="0.95">
        <text x="14" y="22" text-anchor="middle" font-family="serif" font-size="16" fill="#dde9e6" font-weight="900">忠</text>
        <text x="50" y="50" text-anchor="middle" font-family="serif" font-size="16" fill="#dde9e6" font-weight="900">报</text>
      </g>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#3e6a68" letter-spacing="2" opacity="0.7">精忠报国 · 镜心选镜</text>
</g>
</svg>