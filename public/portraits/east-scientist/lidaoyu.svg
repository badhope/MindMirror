<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-85" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="85" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-85" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="92" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-85" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="88" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-85">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-85" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="96" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#faecc8"/>
  <rect x="0" y="0" width="480" height="640" fill="#faecc8" filter="url(#paper-85)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-85" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#faecc8" stop-opacity="0"/>
    <stop offset="100%" stop-color="#3a2008" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-85)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#3a2008" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#3a2008" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#b8842a" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#3a2008" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#b8842a" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#a82828" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#a82828" letter-spacing="2" font-weight="600">盛唐</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#a82828"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#faecc8" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#3a2008" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">山水有灵</tspan><tspan x="0" dy="22">通于经史</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#b8842a" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#b8842a" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 240 L 60 186 L 130 163.5 L 200 195 L 280 150 L 360 177 L 440 204 L 480 222 L 480 480 L 0 480 Z" fill="#d8a850" opacity="0.35"/>
    <path d="M 0 264 L 80 237 L 170 214.5 L 260 246 L 340 210 L 420 241.5 L 480 259.5 L 480 480 L 0 480 Z" fill="#d8a850" opacity="0.55"/>
  </g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 320 L 60 284 L 130 269 L 200 290 L 280 260 L 360 278 L 440 296 L 480 308 L 480 480 L 0 480 Z" fill="#d8a850" opacity="0.35"/>
    <path d="M 0 344 L 80 326 L 170 311 L 260 332 L 340 308 L 420 329 L 480 341 L 480 480 L 0 480 Z" fill="#d8a850" opacity="0.55"/>
  </g>
        
  <g stroke="#b8842a" stroke-width="0.8" fill="none" opacity="0.7">
    <path d="M 0 420 L 480 420" stroke-dasharray="4 4"/>
    <path d="M 0 432 L 480 432" stroke-dasharray="6 6" opacity="0.6"/>
    <path d="M 0 444 L 480 444" stroke-dasharray="8 8" opacity="0.45"/>
    <path d="M 0 456 L 480 456" stroke-dasharray="12 12" opacity="0.3"/>
  </g>
        
  <g>
    <path d="M 180 280 L 180 370" stroke="#d8a850" stroke-width="3" opacity="0.55"/>
    <path d="M 179 280 L 179 370" stroke="#ffffff" stroke-width="0.5" opacity="0.45"/>
    <path d="M 181 280 L 181 370" stroke="#ffffff" stroke-width="0.4" opacity="0.4"/>
    <path d="M 174 370 q 6 4 12 0" stroke="#d8a850" stroke-width="2" fill="none" opacity="0.5"/>
  </g>
        
  <g stroke="#3a2008" stroke-width="1.4" fill="none" stroke-linecap="round">
    <path d="M 330 420 Q 360 434 390 420 L 382 416 L 338 416 Z" fill="#3a2008" opacity="0.6"/>
    <line x1="360" y1="416" x2="360" y2="384"/>
    <path d="M 360 388 L 364 412 L 356 412 Z" fill="#3a2008" opacity="0.5"/>
  </g>
        
  <g stroke="#3a2008" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="60" y1="440" x2="60" y2="330"/>
    <line x1="54" y1="407" x2="66" y2="407"/>
    <line x1="55" y1="379.5" x2="65" y2="379.5"/>
    <line x1="54" y1="352" x2="66" y2="352"/>
    <path d="M 60 418 q -10 -4 -22 -8" />
    <path d="M 60 385 q 12 -6 24 -10" />
  </g>
        
  <g stroke="#3a2008" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="420" y1="440" x2="420" y2="340"/>
    <line x1="414" y1="410" x2="426" y2="410"/>
    <line x1="415" y1="385" x2="425" y2="385"/>
    <line x1="414" y1="360" x2="426" y2="360"/>
    <path d="M 420 420 q -10 -4 -22 -8" />
    <path d="M 420 390 q 12 -6 24 -10" />
  </g>
        
  <g stroke="#3a2008" stroke-width="1.6" fill="none" stroke-linecap="round">
    <path d="M 80 280 q 18 -8 40 -20 q 20 -10 44 -30"/>
    <circle cx="98" cy="270" r="3.5" fill="#c64a4a"/>
    <circle cx="116" cy="258" r="3.5" fill="#c64a4a"/>
    <circle cx="136" cy="248" r="3.5" fill="#e88a8a"/>
    <circle cx="152" cy="236" r="3" fill="#c64a4a"/>
  </g>
        
  <g fill="#faecc8" opacity="0.85">
    <ellipse cx="140" cy="140" rx="35" ry="6"/>
    <ellipse cx="126" cy="136" rx="12.6" ry="5"/>
    <ellipse cx="152.6" cy="137" rx="14" ry="4"/>
  </g>
        <!-- 河边立者 -->
        <g transform="translate(220 360)" fill="#3a2008" opacity="0.95">
          <ellipse cx="0" cy="0" rx="12" ry="15"/>
          <path d="M -18 12 L -24 60 L 24 60 L 18 12 Z"/>
          <ellipse cx="0" cy="-18" rx="10" ry="12" fill="#b8842a"/>
        </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#b8842a" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#b8842a" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#3a2008" letter-spacing="14" font-weight="700">郦道元</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#b8842a" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#a82828" filter="url(#ink-40)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#faecc8" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#faecc8" font-weight="900">水</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#faecc8" font-weight="900">经</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#faecc8" font-weight="900">注</text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#b8842a" letter-spacing="2" opacity="0.7">水经注 · 镜心选镜</text>
</g>
</svg>