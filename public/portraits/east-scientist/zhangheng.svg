<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-88" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="88" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-88" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="95" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-88" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="91" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-88">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-88" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="99" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#ede4cf"/>
  <rect x="0" y="0" width="480" height="640" fill="#ede4cf" filter="url(#paper-88)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-88" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#ede4cf" stop-opacity="0"/>
    <stop offset="100%" stop-color="#2a2014" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-88)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#2a2014" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#2a2014" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#6a5a45" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#2a2014" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#6a5a45" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#9a3030" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#9a3030" letter-spacing="2" font-weight="600">西汉</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#9a3030"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#ede4cf" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#2a2014" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">浑天仪象</tspan><tspan x="0" dy="22">候风地动</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#6a5a45" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#6a5a45" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 300 L 60 264 L 130 249 L 200 270 L 280 240 L 360 258 L 440 276 L 480 288 L 480 480 L 0 480 Z" fill="#8a7a5a" opacity="0.35"/>
    <path d="M 0 324 L 80 306 L 170 291 L 260 312 L 340 288 L 420 309 L 480 321 L 480 480 L 0 480 Z" fill="#8a7a5a" opacity="0.55"/>
  </g>
        
  <g>
    <circle cx="380" cy="110" r="22" fill="#ede4cf" opacity="0.18"/>
    <circle cx="380" cy="110" r="18" fill="#ede4cf" opacity="0.9"/>
  </g>
        <!-- 浑天仪 -->
        <g transform="translate(240 320)" stroke="#2a2014" stroke-width="1.4" fill="none">
          <circle cx="0" cy="0" r="60" fill="#8a7a5a" opacity="0.4"/>
          <circle cx="0" cy="0" r="50"/>
          <ellipse cx="0" cy="0" rx="60" ry="20" stroke="#2a2014"/>
          <ellipse cx="0" cy="0" rx="50" ry="40"/>
          <line x1="0" y1="-60" x2="0" y2="60" stroke-width="0.6"/>
          <line x1="-60" y1="0" x2="60" y2="0" stroke-width="0.6"/>
          <circle cx="0" cy="0" r="3" fill="#9a3030"/>
        </g>
        <!-- 地动仪 -->
        <g transform="translate(140 400)" stroke="#2a2014" stroke-width="1.2" fill="#6a5a45" opacity="0.85">
          <ellipse cx="0" cy="0" rx="40" ry="14"/>
          <rect x="-40" y="0" width="80" height="20"/>
          <ellipse cx="0" cy="20" rx="40" ry="14"/>
          <circle cx="40" cy="-2" r="3" fill="#ede4cf"/><path d="M 40 -6 L 36 -14" stroke-width="0.6"/><circle cx="28.284271247461902" cy="7.899494936611664" r="3" fill="#ede4cf"/><path d="M 28.284271247461902 3.8994949366116636 L 24.284271247461902 -4.100505063388336" stroke-width="0.6"/><circle cx="2.4492935982947065e-15" cy="12" r="3" fill="#ede4cf"/><path d="M 2.4492935982947065e-15 8 L -3.9999999999999973 0" stroke-width="0.6"/><circle cx="-28.2842712474619" cy="7.899494936611665" r="3" fill="#ede4cf"/><path d="M -28.2842712474619 3.8994949366116654 L -32.2842712474619 -4.100505063388335" stroke-width="0.6"/><circle cx="-40" cy="-1.9999999999999982" r="3" fill="#ede4cf"/><path d="M -40 -5.999999999999998 L -44 -13.999999999999998" stroke-width="0.6"/><circle cx="-28.28427124746191" cy="-11.899494936611664" r="3" fill="#ede4cf"/><path d="M -28.28427124746191 -15.899494936611664 L -32.28427124746191 -23.899494936611664" stroke-width="0.6"/><circle cx="-7.347880794884118e-15" cy="-16" r="3" fill="#ede4cf"/><path d="M -7.347880794884118e-15 -20 L -4.000000000000007 -28" stroke-width="0.6"/><circle cx="28.284271247461895" cy="-11.899494936611667" r="3" fill="#ede4cf"/><path d="M 28.284271247461895 -15.899494936611667 L 24.284271247461895 -23.899494936611667" stroke-width="0.6"/>
        </g>
        <!-- 立者 -->
        <g transform="translate(360 350)" fill="#2a2014" opacity="0.95">
          <ellipse cx="0" cy="0" rx="12" ry="15"/>
          <path d="M -18 12 L -24 60 L 24 60 L 18 12 Z"/>
          <ellipse cx="0" cy="-18" rx="10" ry="12" fill="#6a5a45"/>
        </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#6a5a45" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#6a5a45" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#2a2014" letter-spacing="14" font-weight="700">张衡</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#6a5a45" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#9a3030" filter="url(#ink-27)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#ede4cf" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#ede4cf" font-weight="900">候</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#ede4cf" font-weight="900">风</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#ede4cf" font-weight="900">仪</text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#6a5a45" letter-spacing="2" opacity="0.7">候风地动 · 镜心选镜</text>
</g>
</svg>