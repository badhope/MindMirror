<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-53" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="53" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-53" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="60" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-53" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="56" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-53">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-53" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="64" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#dde9e6"/>
  <rect x="0" y="0" width="480" height="640" fill="#dde9e6" filter="url(#paper-53)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-53" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#dde9e6" stop-opacity="0"/>
    <stop offset="100%" stop-color="#142a28" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-53)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#142a28" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#142a28" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#3e6a68" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#142a28" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#3e6a68" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#902a2a" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#902a2a" letter-spacing="2" font-weight="600">宋</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#902a2a"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#dde9e6" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#142a28" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">以不知为不知</tspan><tspan x="0" dy="22">格物致知</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#3e6a68" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#3e6a68" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 300 L 60 258 L 130 240.5 L 200 265 L 280 230 L 360 251 L 440 272 L 480 286 L 480 480 L 0 480 Z" fill="#5a8a88" opacity="0.35"/>
    <path d="M 0 324 L 80 303 L 170 285.5 L 260 310 L 340 282 L 420 306.5 L 480 320.5 L 480 480 L 0 480 Z" fill="#5a8a88" opacity="0.55"/>
  </g>
        
  <g stroke="#3e6a68" stroke-width="0.8" fill="none" opacity="0.7">
    <path d="M 0 440 L 480 440" stroke-dasharray="4 4"/>
    <path d="M 0 452 L 480 452" stroke-dasharray="6 6" opacity="0.6"/>
    <path d="M 0 464 L 480 464" stroke-dasharray="8 8" opacity="0.45"/>
    <path d="M 0 476 L 480 476" stroke-dasharray="12 12" opacity="0.3"/>
  </g>
        
  <g stroke="#142a28" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="60" y1="440" x2="60" y2="320"/>
    <line x1="54" y1="404" x2="66" y2="404"/>
    <line x1="55" y1="374" x2="65" y2="374"/>
    <line x1="54" y1="344" x2="66" y2="344"/>
    <path d="M 60 416 q -10 -4 -22 -8" />
    <path d="M 60 380 q 12 -6 24 -10" />
  </g>
        
  <g stroke="#142a28" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="420" y1="440" x2="420" y2="330"/>
    <line x1="414" y1="407" x2="426" y2="407"/>
    <line x1="415" y1="379.5" x2="425" y2="379.5"/>
    <line x1="414" y1="352" x2="426" y2="352"/>
    <path d="M 420 418 q -10 -4 -22 -8" />
    <path d="M 420 385 q 12 -6 24 -10" />
  </g>
        
  <g fill="#dde9e6" opacity="0.85">
    <ellipse cx="140" cy="150" rx="35" ry="6"/>
    <ellipse cx="126" cy="146" rx="12.6" ry="5"/>
    <ellipse cx="152.6" cy="147" rx="14" ry="4"/>
  </g>
        
  <g stroke="#142a28" stroke-width="1.2" fill="none">
    <path d="M 210 398 L 240 380 L 270 398 L 264 414 L 216 414 Z" fill="#142a28" opacity="0.6"/>
    <line x1="222" y1="414" x2="222" y2="434"/>
    <line x1="258" y1="414" x2="258" y2="434"/>
    <line x1="210" y1="434" x2="270" y2="434"/>
    <rect x="236" y="416" width="8" height="14" fill="#142a28" opacity="0.4"/>
  </g>
        
  <g>
    <line x1="280" y1="352" x2="280" y2="380" stroke="#142a28" stroke-width="2"/>
    <ellipse cx="280" cy="352" rx="2" ry="3" fill="#e8a028"/>
    <ellipse cx="280" cy="348" rx="3" ry="4" fill="#f8c848" opacity="0.85"/>
    <rect x="274" y="380" width="12" height="4" fill="#142a28"/>
  </g>
        <!-- 案上笔谈 -->
        <rect x="180" y="396" width="120" height="6" fill="#dde9e6" stroke="#3e6a68" stroke-width="0.6"/>
        <!-- 坐者 -->
        <g transform="translate(220 360)" fill="#142a28" opacity="0.95">
          <ellipse cx="0" cy="0" rx="12" ry="15"/>
          <path d="M -18 12 L -24 50 L 24 50 L 18 12 Z"/>
          <ellipse cx="0" cy="-18" rx="10" ry="12" fill="#3e6a68"/>
        </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#3e6a68" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#3e6a68" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#142a28" letter-spacing="14" font-weight="700">沈括</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#3e6a68" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#902a2a" filter="url(#ink-27)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#dde9e6" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#dde9e6" font-weight="900">梦</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#dde9e6" font-weight="900">溪</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#dde9e6" font-weight="900">笔</text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#3e6a68" letter-spacing="2" opacity="0.7">梦溪笔谈 · 镜心选镜</text>
</g>
</svg>