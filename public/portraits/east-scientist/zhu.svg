<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640" preserveAspectRatio="xMidYMid meet">

  <defs>
    <filter id="ink-57" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="57" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>
    <filter id="ink-strong-57" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="64" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6"/>
    </filter>
    <filter id="wash-57" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="60" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="haze-57">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="paper-57" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="68" result="grain"/>
      <feColorMatrix in="grain" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.35
                0 0 0 0 0.20
                0 0 0 0.10 0"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="480" height="640" fill="#e6dcec"/>
  <rect x="0" y="0" width="480" height="640" fill="#e6dcec" filter="url(#paper-57)" opacity="0.55"/>
  <!-- 边角阴影 -->
  <radialGradient id="vignette-57" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#e6dcec" stop-opacity="0"/>
    <stop offset="100%" stop-color="#1a0a20" stop-opacity="0.18"/>
  </radialGradient>
  <rect x="0" y="0" width="480" height="640" fill="url(#vignette-57)"/>
  <!-- 折痕 -->
  <path d="M 0 320 L 480 318" stroke="#1a0a20" stroke-width="0.4" opacity="0.08"/>
  <path d="M 240 0 L 242 640" stroke="#1a0a20" stroke-width="0.3" opacity="0.06"/>

  <rect x="14" y="14" width="452" height="612" fill="none" stroke="#5a3a68" stroke-width="1.4"/>
  <rect x="20" y="20" width="440" height="600" fill="none" stroke="#1a0a20" stroke-width="0.5" opacity="0.5"/>
  <!-- 四角小纹 -->
  <g stroke="#5a3a68" stroke-width="0.9" fill="none" opacity="0.7">
    <path d="M 20 38 L 20 20 L 38 20"/>
    <path d="M 442 20 L 460 20 L 460 38"/>
    <path d="M 460 602 L 460 620 L 442 620"/>
    <path d="M 38 620 L 20 620 L 20 602"/>
  </g>

  <g>
    <!-- 朝代小章：左顶角 -->
    <g transform="translate(34 36)">
      <rect x="0" y="0" width="44" height="22" fill="none" stroke="#8a2848" stroke-width="1.6"/>
      <text x="22" y="15" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="11" fill="#8a2848" letter-spacing="2" font-weight="600">清</text>
    </g>
    <!-- 朝代小印 -->
    <g transform="translate(82 32)">
      <rect x="0" y="0" width="22" height="22" fill="#8a2848"/>
      <text x="11" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#e6dcec" font-weight="700">镜</text>
    </g>
    <!-- 题词：右半 -->
    <g transform="translate(120 44)">
      <text font-family="STKaiti, KaiTi, serif" font-size="15" fill="#1a0a20" letter-spacing="3" font-weight="500">
        <tspan x="0" dy="0">求是</tspan><tspan x="0" dy="22">以日记测天</tspan>
      </text>
    </g>
    <!-- 顶分隔细线 -->
    <line x1="34" y1="78" x2="446" y2="78" stroke="#5a3a68" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="82" x2="446" y2="82" stroke="#5a3a68" stroke-width="0.3" opacity="0.4"/>
  </g>
<!-- 场景区 -->
<g>
        
  <g filter="url(#haze-50)" opacity="0.7">
    <path d="M 0 320 L 60 290 L 130 277.5 L 200 295 L 280 270 L 360 285 L 440 300 L 480 310 L 480 480 L 0 480 Z" fill="#7a5a88" opacity="0.35"/>
    <path d="M 0 344 L 80 329 L 170 316.5 L 260 334 L 340 314 L 420 331.5 L 480 341.5 L 480 480 L 0 480 Z" fill="#7a5a88" opacity="0.55"/>
  </g>
        
  <g fill="#e6dcec" opacity="0.85">
    <ellipse cx="140" cy="140" rx="35" ry="6"/>
    <ellipse cx="126" cy="136" rx="12.6" ry="5"/>
    <ellipse cx="152.6" cy="137" rx="14" ry="4"/>
  </g>
        
  <g stroke="#1a0a20" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="60" y1="440" x2="60" y2="330"/>
    <line x1="54" y1="407" x2="66" y2="407"/>
    <line x1="55" y1="379.5" x2="65" y2="379.5"/>
    <line x1="54" y1="352" x2="66" y2="352"/>
    <path d="M 60 418 q -10 -4 -22 -8" />
    <path d="M 60 385 q 12 -6 24 -10" />
  </g>
        
  <g stroke="#1a0a20" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="420" y1="440" x2="420" y2="340"/>
    <line x1="414" y1="410" x2="426" y2="410"/>
    <line x1="415" y1="385" x2="425" y2="385"/>
    <line x1="414" y1="360" x2="426" y2="360"/>
    <path d="M 420 420 q -10 -4 -22 -8" />
    <path d="M 420 390 q 12 -6 24 -10" />
  </g>
        <!-- 气象仪器 -->
        <g transform="translate(160 400)" stroke="#1a0a20" stroke-width="0.8" fill="#7a5a88" opacity="0.85">
          <rect x="-10" y="-40" width="20" height="40"/>
          <ellipse cx="0" cy="-44" rx="12" ry="4" fill="#e6dcec"/>
        </g>
        <g transform="translate(220 400)" stroke="#1a0a20" stroke-width="0.8" fill="#7a5a88" opacity="0.85">
          <circle cx="0" cy="-20" r="14" fill="#e6dcec"/>
          <line x1="0" y1="-6" x2="0" y2="0"/>
        </g>
        <!-- 风旗 -->
        <g transform="translate(360 380)">
          <line x1="0" y1="0" x2="0" y2="-40" stroke="#1a0a20" stroke-width="1"/>
          <path d="M 0 -40 L 16 -36 L 0 -32 Z" fill="#8a2848"/>
        </g>
        <!-- 案上日记 -->
        <rect x="240" y="380" width="100" height="6" fill="#e6dcec" stroke="#1a0a20" stroke-width="0.6"/>
        <!-- 立者 -->
        <g transform="translate(300 360)" fill="#1a0a20" opacity="0.95">
          <ellipse cx="0" cy="0" rx="12" ry="15"/>
          <path d="M -18 12 L -24 56 L 24 56 L 18 12 Z"/>
          <ellipse cx="0" cy="-18" rx="10" ry="12" fill="#5a3a68"/>
        </g></g>

  <g>
    <!-- 底分隔细线 -->
    <line x1="34" y1="500" x2="446" y2="500" stroke="#5a3a68" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="504" x2="446" y2="504" stroke="#5a3a68" stroke-width="0.3" opacity="0.4"/>
    <!-- 姓名：左半横排大字 -->
    <g transform="translate(46 540)">
      <text font-family="STKaiti, KaiTi, serif" font-size="38" fill="#1a0a20" letter-spacing="14" font-weight="700">竺可桢</text>
      <!-- 姓名小注：右侧小字 -->
      <text x="0" y="40" font-family="STKaiti, KaiTi, serif" font-size="10" fill="#5a3a68" letter-spacing="3" opacity="0.85">东方文人 · 镜心之镜</text>
    </g>
    <!-- 篆刻朱砂方印：右下角 -->
    <g transform="translate(360 530)">
      <rect x="0" y="0" width="64" height="64" fill="#8a2848" filter="url(#ink-40)"/>
      <rect x="2" y="2" width="60" height="60" fill="none" stroke="#e6dcec" stroke-width="0.8" opacity="0.6"/>
      
      <text x="32" y="20" text-anchor="middle" font-family="serif" font-size="20" fill="#e6dcec" font-weight="900">求</text>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="20" fill="#e6dcec" font-weight="900">是</text>
      <text x="32" y="60" text-anchor="middle" font-family="serif" font-size="20" fill="#e6dcec" font-weight="900"></text>
    </g>
  </g>
<!-- 副标：人物小注 -->
<g transform="translate(46 600)">
  <text font-family="STKaiti, KaiTi, serif" font-size="10" fill="#5a3a68" letter-spacing="2" opacity="0.7">求是竺公 · 镜心选镜</text>
</g>
</svg>