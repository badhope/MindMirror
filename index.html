<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pwa-512x512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="心镜 MindMirror - 照见自己，成为更好的自己，43种专业心理测评探索真实的自己" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="keywords" content="心镜,心理测评,人格测评,MBTI,大五人格,自我探索,心灵成长,人性探索,专业测评" />
    <meta name="author" content="心镜团队" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mindmirror.dpdns.org/" />
    <meta property="og:title" content="心镜 MindMirror | 专业心理测评平台" />
    <meta property="og:description" content="照见自己，成为更好的自己 - 提供43种专业心理测评，帮助你探索真实的自我" />
    <meta property="og:image" content="https://mindmirror.dpdns.org/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://mindmirror.dpdns.org/" />
    <meta property="twitter:title" content="心镜 MindMirror | 专业心理测评平台" />
    <meta property="twitter:description" content="照见自己，成为更好的自己 - 提供43种专业心理测评，帮助你探索真实的自我" />
    <meta property="twitter:image" content="https://mindmirror.dpdns.org/og-image.png" />
    
    <title>心镜 MindMirror</title>
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "MindMirror",
      "description": "专业测评网站集合平台，提供人格测评、技能评估、心理测试等多种在线测评服务",
      "url": "https://mindmirror.dpdns.org/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://mindmirror.dpdns.org/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MindMirror",
      "url": "https://mindmirror.dpdns.org/",
      "logo": "https://mindmirror.dpdns.org/logo.png",
      "sameAs": []
    }
    </script>
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      /* Loading state - minimal, no animation */
      #root:empty {
        background: #0f172a;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
