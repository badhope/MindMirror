    <style>
      html, body { height: 100%; margin: 0; }
      body {
        background: #f5efe0;
        color: #1a1a1a;
        font-family: '思源宋体', 'Source Han Serif SC', 'Songti SC', 'STSong', '宋体', serif;
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
      }
      #jx-boot {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      #jx-boot .seal {
        width: 64px; height: 64px; margin: 0 auto 20px;
        background: #a8322e; color: #f5efe0;
        font-family: '霞鹜文楷','LXGW WenKai','STKaiti',serif;
        font-size: 32px; line-height: 64px;
        border-radius: 4px;
        box-shadow: 0 2px 8px rgba(168,50,46,0.2);
      }
      #jx-boot h1 {
        margin: 0 0 12px;
        font-family: '霞鹜文楷','LXGW WenKai','STKaiti',serif;
        font-weight: 400;
        font-size: 32px;
        letter-spacing: 0.3em;
      }
      #jx-boot p { margin: 0 0 24px; color: #5a5a5a; max-width: 480px; }
      #jx-boot .spin {
        display: inline-flex; gap: 10px; align-items: center;
        padding: 10px 20px; background: #ebe3cf; border-radius: 999px;
        font-size: 14px; color: #5a5a5a;
      }
      #jx-boot .dot {
        width: 12px; height: 12px;
        border: 2px solid #c8b88a;
        border-top-color: #a8322e;
        border-radius: 50%;
        animation: jx-spin 0.8s linear infinite;
      }
      @keyframes jx-spin { to { transform: rotate(360deg); } }
