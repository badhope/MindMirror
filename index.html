    <style>
      html, body { height: 100%; margin: 0; overflow-x: hidden; max-width: 100vw; }
      body {
        background: #f5efe0;
        color: #1a1a1a;
        font-family: '华文宋体', 'STSong', '宋体', 'SimSun', serif;
        font-size: 18px;
        line-height: 1.8;
        -webkit-font-smoothing: antialiased;
        text-align: center;
      }
      #jx-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        background: #f5efe0;
        transition: opacity 400ms ease;
      }
      #jx-boot .seal {
        width: 80px; height: 80px; margin: 0 auto 24px;
        background: #a8322e; color: #f5efe0;
        font-family: '华文行楷', 'STXingkai', '楷体', serif;
        font-size: 40px; line-height: 80px;
        border-radius: 4px;
        box-shadow: 0 4px 16px rgba(168,50,46,0.3);
        font-weight: 500;
      }
      #jx-boot h1 {
        margin: 0 0 16px;
        font-family: '华文行楷', 'STXingkai', '楷体', serif;
        font-weight: 500;
        font-size: 40px;
        letter-spacing: 0.4em;
      }
      #jx-boot p { margin: 0 0 32px; color: #5a5a5a; max-width: 480px; font-size: 18px; }
      #jx-boot .spin {
        display: inline-flex; gap: 12px; align-items: center;
        padding: 12px 24px; background: #ebe3cf; border-radius: 999px;
        font-size: 16px; color: #5a5a5a;
      }
      #jx-boot .dot {
        width: 14px; height: 14px;
        border: 2px solid #c8b88a;
        border-top-color: #a8322e;
        border-radius: 50%;
        animation: jx-spin 0.8s linear infinite;
      }
      @keyframes jx-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- 启动加载页：放在 #root 外，React 挂载时清除 -->
    <div id="jx-boot">
      <div>
        <div class="seal">镜</div>
        <h1>镜心</h1>
        <p>一面问己之镜。三分钟，三千年。</p>
        <div class="spin"><span class="dot"></span> 入镜中…</div>
      </div>
    </div>
    <div id="root"></div>
    <noscript>
      <div style="max-width:640px;margin:80px auto;text-align:center;padding:0 20px;font-family:serif">
        <h1>镜心 需 JavaScript 方可入镜</h1>
        <p>镜心 是一面纯前端的问己之镜。请开启 JavaScript，再来照一照。</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
    <!-- C10 PWA：注册 SW -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
    </script>
  </body>
