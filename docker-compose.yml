version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mental_health_postgres
    environment:
      POSTGRES_USER: mental_user
      POSTGRES_PASSWORD: mental_password
      POSTGRES_DB: mental_health_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mental_user -d mental_health_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mental_health_backend
    environment:
      DATABASE_URL: postgresql://mental_user:mental_password@postgres:5432/mental_health_db
      SECRET_KEY: your-super-secret-key-change-in-production-!@#$%^&*()
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        pip install -r requirements.txt &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data:
